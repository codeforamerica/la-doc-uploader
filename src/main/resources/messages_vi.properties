how-this-works.submitting-an-incomplete-app-l1=B\u1ea1n s\u1ebd có l\u1ef1a ch\u1ecdn g\u1eedi \u0111\u01a1n \u0111\u0103ng ký không \u0111\u1ea7y \u0111\u1ee7 ch\u1ec9 có tęn, \u0111\u1ecba ch\u1ec9 vŕ ch\u1eef ký c\u1ee7a b\u1ea1n.
how-this-works.submitting-an-incomplete-app-l2=N\u1ebfu b\u1ea1n g\u1eedi \u0111\u01a1n \u0111\u0103ng ký không \u0111\u1ea7y \u0111\u1ee7, b\u1ea1n có th\u1ec3 m\u1ea5t nhi\u1ec1u th\u1eddi gian x\u1eed lý h\u01a1n vŕ lięn l\u1ea1c nhi\u1ec1u h\u01a1n v\u1edbi DCFS.
