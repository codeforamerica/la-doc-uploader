legal-main-body=Câu có d\u1ea5u hoa th\u1ecb (*) lŕ câu h\u1ecfi b\u1eaft bu\u1ed9c.<br/><br/>M\u1edf r\u1ed9ng các ô bęn d\u01b0\u1edbi \u0111\u1ec3 xem l\u1ea1i các \u0111i\u1ec1u kho\u1ea3n. \u0110ánh d\u1ea5u vŕo các ô \u0111\u1ec3 xác nh\u1eadn quý v\u1ecb \u0111\u1ed3ng ý v\u1edbi \u0111i\u1ec1u kho\u1ea3n.
legal-expanded.header1=Quy\u1ec1n vŕ trách nhi\u1ec7m c\u1ee7a b\u1ea1n
legal-expanded.body1=<p>Khi nh\u1eadn \u0111\u01b0\u1ee3c phúc l\u1ee3i t\u1eeb B\u1ed9 D\u1ecbch v\u1ee5 Gia \u0111ěnh vŕ Tr\u1ebb em Louisiana, quý v\u1ecb có m\u1ed9t s\u1ed1 quy\u1ec1n vŕ trách nhi\u1ec7m nh\u1ea5t \u0111\u1ecbnh nh\u01b0 \u0111\u01b0\u1ee3c gi\u1ea3i thích bęn d\u01b0\u1edbi.<br/><br/>Quy\u1ec1n c\u1ee7a quý v\u1ecb lŕ gě?</p> <ul class="list--bulleted"><li>Không b\u1ecb phân bi\u1ec7t \u0111\u1ed1i x\u1eed - T\u1ed5 ch\u1ee9c nŕy c\u1ea5m hŕnh vi phân bi\u1ec7t \u0111\u1ed1i x\u1eed d\u1ef1a tręn ch\u1ee7ng t\u1ed9c, mŕu da, quę quán qu\u1ed1c t\u1ecbch, tu\u1ed5i tác, khuy\u1ebft t\u1eadt, gi\u1edbi tính, vŕ trong m\u1ed9t s\u1ed1 tr\u01b0\u1eddng h\u1ee3p lŕ khác bi\u1ec7t v\u1ec1 tôn giáo ho\u1eb7c quan \u0111i\u1ec3m chính tr\u1ecb. B\u1ed9 Nông nghi\u1ec7p Hoa K\u1ef3 c\u0169ng c\u1ea5m hŕnh vi phân bi\u1ec7t \u0111\u1ed1i x\u1eed \u0111\u1ed1i v\u1edbi khách hŕng, nhân vięn vŕ ng\u01b0\u1eddi n\u1ed9p \u0111\u01a1n xin vi\u1ec7c d\u1ef1a tręn ch\u1ee7ng t\u1ed9c, mŕu da, quę quán, tu\u1ed5i tác, khuy\u1ebft t\u1eadt, gi\u1edbi tính, b\u1ea3n d\u1ea1ng gi\u1edbi, tôn giáo, thů oán, vŕ n\u1ebfu có, quan \u0111i\u1ec3m chính tr\u1ecb, těnh tr\u1ea1ng hôn nhân, těnh tr\u1ea1ng gia \u0111ěnh ho\u1eb7c cha m\u1eb9, khuynh h\u01b0\u1edbng těnh d\u1ee5c, toŕn b\u1ed9 ho\u1eb7c m\u1ed9t ph\u1ea7n thu nh\u1eadp c\u1ee7a m\u1ed9t cá nhân có \u0111\u01b0\u1ee3c t\u1eeb b\u1ea5t k\u1ef3 ch\u01b0\u01a1ng trěnh h\u1ed7 tr\u1ee3 công c\u1ed9ng nŕo ho\u1eb7c thông tin di truy\u1ec1n \u0111\u01b0\u1ee3c b\u1ea3o v\u1ec7 trong vi\u1ec7c lŕm ho\u1eb7c trong b\u1ea5t k\u1ef3 ch\u01b0\u01a1ng trěnh ho\u1eb7c ho\u1ea1t \u0111\u1ed9ng nŕo do B\u1ed9 th\u1ef1c hi\u1ec7n ho\u1eb7c tŕi tr\u1ee3. (Không ph\u1ea3i t\u1ea5t c\u1ea3 các c\u01a1 s\u1edf b\u1ecb c\u1ea5m \u0111\u1ec1u áp d\u1ee5ng cho t\u1ea5t c\u1ea3 các ch\u01b0\u01a1ng trěnh vŕ/ho\u1eb7c ho\u1ea1t \u0111\u1ed9ng vi\u1ec7c lŕm) Ng\u01b0\u1eddi khuy\u1ebft t\u1eadt c\u1ea7n ph\u01b0\u01a1ng ti\u1ec7n giao ti\u1ebfp thay th\u1ebf \u0111\u1ec3 bi\u1ebft thông tin ch\u01b0\u01a1ng trěnh (ví d\u1ee5: ch\u1eef n\u1ed5i Braille, ch\u1eef in l\u1edbn, b\u0103ng ghi âm, Ngôn ng\u1eef ký hi\u1ec7u Hoa K\u1ef3, v.v.), nęn lięn h\u1ec7 v\u1edbi C\u01a1 quan (Ti\u1ec3u bang ho\u1eb7c \u0111\u1ecba ph\u01b0\u01a1ng) n\u01a1i h\u1ecd n\u1ed9p \u0111\u01a1n xin tr\u1ee3 c\u1ea5p. Nh\u1eefng ng\u01b0\u1eddi b\u1ecb khi\u1ebfm thính, lăng tai ho\u1eb7c b\u1ecb khuy\u1ebft t\u1eadt v\u1ec1 ngôn ng\u1eef có th\u1ec3 lięn h\u1ec7 v\u1edbi USDA thông qua D\u1ecbch v\u1ee5 Phięn d\u1ecbch cho ng\u01b0\u1eddi khi\u1ebfm thính Lięn bang theo s\u1ed1 (800) 877-8339. Ngoŕi ra, thông tin ch\u01b0\u01a1ng trěnh có th\u1ec3 \u0111\u01b0\u1ee3c cung c\u1ea5p b\u1eb1ng các ngôn ng\u1eef khác ngoŕi ti\u1ebfng Anh. \u0110\u1ec3 g\u1eedi khi\u1ebfu n\u1ea1i v\u1ec1 s\u1ef1 phân bi\u1ec7t \u0111\u1ed1i x\u1eed c\u1ee7a ch\u01b0\u01a1ng trěnh, hăy hoŕn thŕnh M\u1eabu Khi\u1ebfu n\u1ea1i Phân bi\u1ec7t \u0111\u1ed1i x\u1eed trong Ch\u01b0\u01a1ng trěnh USDA, (AD-3027), truy c\u1eadp tr\u1ef1c tuy\u1ebfn t\u1ea1i <a target="_blank" rel="noreferrer noopener" href="http://www.ascr.usda.gov/complaint_filing_cust.html"> http://www.ascr.usda.gov/complaint_filing_cust.html</a>, ho\u1eb7c t\u1ea1i b\u1ea5t k\u1ef3 v\u0103n phňng USDA nŕo, ho\u1eb7c vi\u1ebft m\u1ed9t lá th\u01b0 g\u1eedi t\u1edbi USDA vŕ cung c\u1ea5p t\u1ea5t c\u1ea3 thông tin mŕ bi\u1ec3u m\u1eabu yęu c\u1ea7u trong th\u01b0. \u0110\u1ec3 nh\u1eadn m\u1ed9t b\u1ea3n sao m\u1eabu \u0111\u01a1n khi\u1ebfu n\u1ea1i, hăy g\u1ecdi (866) 632-9992. G\u1eedi bi\u1ec3u m\u1eabu ho\u1eb7c lá th\u01b0 \u0111ă \u0111i\u1ec1n \u0111\u1ea7y \u0111\u1ee7 c\u1ee7a quý v\u1ecb t\u1edbi USDA b\u1eb1ng cách: <ul> <li>1. Th\u01b0: V\u0103n phňng Tr\u1ee3 lý B\u1ed9 tr\u01b0\u1edfng Dân quy\u1ec1n thu\u1ed9c B\u1ed9 Nông nghi\u1ec7p Hoa K\u1ef3 <br/> 1400 Independence Avenue, SW Washington, D.C. 20250-94102.</li><li>2. Fax: (202) 690-7442; ho\u1eb7c </li><li>3. Email: <a href = "mailto: program.intake@usda.gov">program.intake@usda.gov</a>.</li></ul> \u0110\u1ec3 bi\u1ebft thông tin khác lięn quan \u0111\u1ebfn Ch\u01b0\u01a1ng trěnh H\u1ed7 tr\u1ee3 Dinh d\u01b0\u1ee1ng B\u1ed5 sung (SNAP), m\u1ecdi ng\u01b0\u1eddi nęn lięn h\u1ec7 v\u1edbi \u0111\u01b0\u1eddng dây nóng SNAP c\u1ee7a USDA theo s\u1ed1 (800) 221-5689, c\u0169ng b\u1eb1ng ti\u1ebfng Tây Ban Nha ho\u1eb7c g\u1ecdi t\u1edbi \u0110\u01b0\u1eddng dây nóng/Thông tin Ti\u1ec3u bang (nh\u1ea5p vŕo lięn k\u1ebft \u0111\u1ec3 xem danh sách các s\u1ed1 \u0111i\u1ec7n tho\u1ea1i \u0111\u01b0\u1eddng dây nóng theo Ti\u1ec3u bang); có th\u1ec3 truy c\u1eadp tr\u1ef1c tuy\u1ebfn t\u1ea1i <a target="_blank" rel="noreferrer noopener" href="http://www.fns.usda.gov/snap/contact_info/hotlines.htm"> http://www.fns.usda. gov/snap/contact_info/hotlines.htm</a>. \u0110\u1ec3 n\u1ed9p \u0111\u01a1n khi\u1ebfu n\u1ea1i v\u1ec1 hŕnh vi phân bi\u1ec7t \u0111\u1ed1i x\u1eed lięn quan \u0111\u1ebfn m\u1ed9t ch\u01b0\u01a1ng trěnh nh\u1eadn h\u1ed7 tr\u1ee3 tŕi chính c\u1ee7a Lięn bang thông qua B\u1ed9 Y t\u1ebf vŕ D\u1ecbch v\u1ee5 Nhân sinh Hoa K\u1ef3 (HHS), hăy vi\u1ebft: HHS Director, Office for Civil Rights, Room 515-F, 200 Independence Avenue, S.W., Washington, D.C. 20201 ho\u1eb7c g\u1ecdi (202) 619-0403 (trao \u0111\u1ed5i qua cu\u1ed9c g\u1ecdi tho\u1ea1i) ho\u1eb7c (800) 537-7697 (phięn d\u1ecbch cho ng\u01b0\u1eddi khi\u1ebfm thính). T\u1ed5 ch\u1ee9c nŕy lŕ nhŕ cung c\u1ea5p c\u01a1 h\u1ed9i gia \u0111ěnh běnh \u0111\u1eb3ng.</li><li>Khi\u1ebfu n\u1ea1i - Khi\u1ebfu n\u1ea1i v\u1ec1 ch\u01b0\u01a1ng trěnh có th\u1ec3 \u0111\u01b0\u1ee3c g\u1eedi t\u1edbi B\u1ed9 D\u1ecbch v\u1ee5 Tr\u1ebb em vŕ Gia \u0111ěnh (DCFS) b\u1eb1ng cách g\u1eedi email t\u1edbi <a href = "mailto: LAHELPU.DCFS@LA.GOV">LAHELPU.DCFS@LA.GOV</a> ho\u1eb7c b\u1eb1ng cách g\u1ecdi t\u1edbi s\u1ed1 225-342-2342. Quý v\u1ecb có th\u1ec3 n\u1ed9p \u0111\u01a1n khi\u1ebfu n\u1ea1i v\u1ec1 quy\u1ec1n dân s\u1ef1 lęn B\u1ed9 D\u1ecbch v\u1ee5 Gia \u0111ěnh vŕ Tr\u1ebb em (DCFS) b\u1eb1ng cách \u0111i\u1ec1n vŕo M\u1eabu Khi\u1ebfu n\u1ea1i Dân quy\u1ec1n DCFS. N\u1ed9p \u0111\u01a1n cho v\u0103n phňng \u0111\u1ecba ph\u01b0\u01a1ng; g\u1eedi nó \u0111\u1ebfn B\u1ed9 ph\u1eadn Dân quy\u1ec1n DCFS, \u0110\u1ecba ch\u1ec9 h\u1ed9 gia \u0111ěnhp th\u01b0 b\u01b0u \u0111i\u1ec7n lŕ 1887, Baton Rouge, LA 70821; email <a href = "mailto: DCFS.BureauofCivilRights@LA.GOV">DCFS.BureauofCivilRights@LA.GOV</a>, ho\u1eb7c; g\u1ecdi (225) 342-0309. Quý v\u1ecb có th\u1ec3 n\u1ed9p \u0111\u01a1n khi\u1ebfu n\u1ea1i v\u1ec1 quy\u1ec1n dân s\u1ef1 v\u1edbi DCFS vŕ USDA ho\u1eb7c ch\u1ec9 DCFS.</li><li>\u0110i\u1ec1u tr\u1ea7n công b\u1eb1ng - N\u1ebfu quý v\u1ecb không \u0111\u1ed3ng ý v\u1edbi b\u1ea5t k\u1ef3 quy\u1ebft \u0111\u1ecbnh nŕo \u0111\u01b0\u1ee3c \u0111\u01b0a ra \u0111\u1ed1i v\u1edbi tr\u01b0\u1eddng h\u1ee3p c\u1ee7a měnh, quý v\u1ecb có quy\u1ec1n yęu c\u1ea7u xem xét l\u1ea1i tr\u01b0\u1eddng h\u1ee3p c\u1ee7a měnh. Quý v\u1ecb có th\u1ec3 yęu c\u1ea7u m\u1ed9t phięn \u0111i\u1ec1u tr\u1ea7n công b\u1eb1ng b\u1eb1ng v\u0103n b\u1ea3n, tr\u1ef1c ti\u1ebfp ho\u1eb7c b\u1eb1ng cách g\u1ecdi \u0111\u1ebfn v\u0103n phňng. Quý v\u1ecb có quy\u1ec1n xem thông tin tr\u01b0\u1eddng h\u1ee3p c\u1ee7a měnh tr\u01b0\u1edbc phięn \u0111i\u1ec1u tr\u1ea7n.</li></ul><br/><p>Trách nhi\u1ec7m c\u1ee7a quý v\u1ecb lŕ gě?</p><ul class="list--bulleted"><li>H\u1ee3p tác - Quý v\u1ecb ph\u1ea3i h\u1ee3p tác b\u1eb1ng cách cung c\u1ea5p thông tin chúng tôi c\u1ea7n \u0111\u1ec3 xác \u0111\u1ecbnh kh\u1ea3 n\u0103ng \u0111\u1ea1t \u0111i\u1ec1u ki\u1ec7n nh\u1eadn phúc l\u1ee3i c\u1ee7a quý v\u1ecb vŕ nh\u1eefng ng\u01b0\u1eddi khác mŕ quý v\u1ecb \u0111ang n\u1ed9p \u0111\u01a1n xin tr\u1ee3 c\u1ea5p. Quý v\u1ecb c\u0169ng ph\u1ea3i cung c\u1ea5p b\u1eb1ng ch\u1ee9ng v\u1ec1 thông tin quý v\u1ecb báo cáo. Quý v\u1ecb s\u1ebd ph\u1ea3i h\u1ee3p tác n\u1ebfu chúng tôi c\u1ea7n c\u1eed ng\u01b0\u1eddi \u0111\u1ebfn th\u0103m vŕ xem xét h\u1ed9 gia \u0111ěnh gia \u0111ěnh có \u0111\u1ea1t \u0111i\u1ec1u ki\u1ec7n hay không. N\u1ebfu tr\u01b0\u1eddng h\u1ee3p c\u1ee7a quý v\u1ecb \u0111\u01b0\u1ee3c các nhân vięn \u0111ánh giá c\u1ee7a ti\u1ec3u bang ho\u1eb7c lięn bang ch\u1ecdn \u0111\u1ec3 \u0111ánh giá ki\u1ec3m soát ch\u1ea5t l\u01b0\u1ee3ng, thě quý v\u1ecb ph\u1ea3i h\u1ee3p tác v\u1edbi h\u1ecd.</li></ul><p>Báo cáo thay \u0111\u1ed5i<br/><br/>N\u1ebfu quý v\u1ecb nh\u1eadn \u0111\u01b0\u1ee3c tr\u1ee3 c\u1ea5p SNAP, quý v\u1ecb ph\u1ea3i báo cáo:</p><ul class="list--bulleted"><li>Khi thu nh\u1eadp t\u0103ng lęn ho\u1eb7c n\u1ebfu ai \u0111ó có thu nh\u1eadp chuy\u1ec3n \u0111\u1ebfn \u1edf t\u1ea1i nhŕ, hăy c\u1ed9ng s\u1ed1 ti\u1ec1n thu nh\u1eadp ki\u1ebfm \u0111\u01b0\u1ee3c vŕ không ki\u1ebfm \u0111\u01b0\u1ee3c cho t\u1ea5t c\u1ea3 các thŕnh vięn h\u1ed9 gia \u0111ěnh gia \u0111ěnh. N\u1ebfu s\u1ed1 ti\u1ec1n nŕy l\u1edbn h\u01a1n 130% M\u1ee9c Nghčo Lięn bang \u0111\u1ed1i v\u1edbi quy mô h\u1ed9 gia \u0111ěnh c\u1ee7a quý v\u1ecb \u0111\u01b0\u1ee3c hi\u1ec3n th\u1ecb trong thông báo SNAP g\u1ea7n \u0111ây nh\u1ea5t c\u1ee7a quý v\u1ecb, thě thay \u0111\u1ed5i nŕy ph\u1ea3i \u0111\u01b0\u1ee3c báo cáo cho DCFS.</li><li>N\u1ebfu h\u1ed9 gia \u0111ěnh gia \u0111ěnh c\u1ee7a quý v\u1ecb nh\u1eadn \u0111\u01b0\u1ee3c ti\u1ec1n th\u1eafng x\u1ed5 s\u1ed1 ho\u1eb7c c\u1edd b\u1ea1c t\u1eeb $4.250,00 tr\u1edf lęn, th\u1eafng trong m\u1ed9t trň ch\u01a1i tr\u01b0\u1edbc thu\u1ebf ho\u1eb7c kho\u1ea3n kh\u1ea5u tr\u1eeb.</li><li>N\u1ebfu quý v\u1ecb nh\u1eadn \u0111\u01b0\u1ee3c FITAP, quý v\u1ecb ph\u1ea3i tuân theo các yęu c\u1ea7u báo cáo \u0111\u01b0\u1ee3c gi\u1ea3i thích trong Th\u1ecfa thu\u1eadn Gia \u0111ěnh Thŕnh công c\u1ee7a quý v\u1ecb vŕ báo cáo nh\u1eefng thay \u0111\u1ed5i nŕy trong vňng 10 ngŕy k\u1ec3 t\u1eeb khi quý v\u1ecb bi\u1ebft v\u1ec1 s\u1ef1 thay \u0111\u1ed5i vŕ báo cáo trong vňng 10 ngŕy n\u1ebfu \u0111\u1ee9a tr\u1ebb \u0111\u1ee7 \u0111i\u1ec1u ki\u1ec7n nh\u1eadn tr\u1ee3 c\u1ea5p FITAP v\u1eeba chuy\u1ec3n ra kh\u1ecfi nhŕ c\u1ee7a quý v\u1ecb.</li><li>N\u1ebfu quý v\u1ecb \u0111ang nh\u1eadn tr\u1ee3 c\u1ea5p Sau FITAP, quý v\u1ecb c\u0169ng ph\u1ea3i báo cáo trong vňng 10 ngŕy n\u1ebfu quý v\u1ecb ng\u1eebng lŕm vi\u1ec7c, n\u1ebfu \u0111\u1ee9a tr\u1ebb duy nh\u1ea5t trong nhŕ chuy\u1ec3n ra kh\u1ecfi nhŕ vŕ n\u1ebfu quý v\u1ecb chuy\u1ec3n ra kh\u1ecfi ti\u1ec3u bang.</li><li>N\u1ebfu quý v\u1ecb nh\u1eadn \u0111\u01b0\u1ee3c KCSP, quý v\u1ecb ph\u1ea3i báo cáo trong vňng 10 ngŕy n\u1ebfu \u0111\u1ee9a tr\u1ebb duy nh\u1ea5t \u0111\u1ee7 \u0111i\u1ec1u ki\u1ec7n nh\u1eadn tr\u1ee3 c\u1ea5p KCSP chuy\u1ec3n ra kh\u1ecfi nhŕ c\u1ee7a quý v\u1ecb.</li><li>N\u1ebfu quý v\u1ecb không nh\u1eadn \u0111\u01b0\u1ee3c tr\u1ee3 c\u1ea5p SNAP vŕ \u0111ang nh\u1eadn FITAP, KCSP ho\u1eb7c CCAP, quý v\u1ecb ph\u1ea3i báo cáo trong vňng 10 ngŕy n\u1ebfu: Có s\u1ef1 thay \u0111\u1ed5i v\u1ec1 ngu\u1ed3n c\u1ee7a b\u1ea5t k\u1ef3 kho\u1ea3n thu nh\u1eadp nŕo nh\u1eadn \u0111\u01b0\u1ee3c trong h\u1ed9 gia \u0111ěnh (\u0110i\u1ec1u nŕy bao g\u1ed3m nh\u1eefng thay \u0111\u1ed5i v\u1ec1 ng\u01b0\u1eddi s\u1eed d\u1ee5ng lao \u0111\u1ed9ng vŕ các ngu\u1ed3n thu nh\u1eadp nh\u01b0 h\u1ed7 tr\u1ee3 nuôi con, An sinh xă h\u1ed9 gia \u0111ěnhi, SSI, v.v.), s\u1ed1 ti\u1ec1n thu nh\u1eadp không ki\u1ebfm \u0111\u01b0\u1ee3c c\u1ee7a h\u1ed9 gia \u0111ěnh thay \u0111\u1ed5i h\u01a1n $100 m\u1ed7i tháng, s\u1ed1 ti\u1ec1n thu nh\u1eadp ki\u1ebfm \u0111\u01b0\u1ee3c c\u1ee7a h\u1ed9 gia \u0111ěnh thay \u0111\u1ed5i h\u01a1n $100 m\u1ed7i tháng, có ng\u01b0\u1eddi chuy\u1ec3n \u0111\u1ebfn ho\u1eb7c ra kh\u1ecfi h\u1ed9 gia \u0111ěnh, ho\u1eb7c quý v\u1ecb chuy\u1ec3n \u0111i.</li><li>\u0110\u1ed1i v\u1edbi FITAP ho\u1eb7c KCSP, quý v\u1ecb ph\u1ea3i báo cáo trong vňng 10 ngŕy b\u1ea5t k\u1ef3 thay \u0111\u1ed5i nŕo v\u1ec1: Vi\u1ec7c \u0111i h\u1ecdc c\u1ee7a b\u1ea5t k\u1ef3 ng\u01b0\u1eddi 18 tu\u1ed5i nŕo trong h\u1ed9 gia \u0111ěnh vŕ těnh tr\u1ea1ng hôn nhân c\u1ee7a b\u1ea5t k\u1ef3 ai trong h\u1ed9 gia \u0111ěnh.</li></ul>
legal-agree=*Tôi \u0111\u1ed3ng ý v\u1edbi các \u0111i\u1ec1u kho\u1ea3n nŕy
legal-expanded.header2=M\u1ee9c x\u1eed ph\u1ea1t khi c\u1ed1 těnh \u0111\u01b0a thông tin sai s\u1ef1 th\u1eadt
legal-expanded.body2=<p>X\u1eed ph\u1ea1t<br/><br/>N\u1ebfu quý v\u1ecb c\u1ed1 těnh báo cáo thông tin không chính xác, các phúc l\u1ee3i SNAP, FITAP ho\u1eb7c KCSP c\u1ee7a quý v\u1ecb có th\u1ec3 b\u1ecb t\u1eeb ch\u1ed1i, gi\u1ea3m b\u1edbt ho\u1eb7c ch\u1ea5m d\u1ee9t vŕ quý v\u1ecb có th\u1ec3 b\u1ecb truy t\u1ed1 hěnh s\u1ef1. <br/><br/>Hěnh ph\u1ea1t nŕo \u0111\u01b0\u1ee3c áp d\u1ee5ng trong SNAP? <br/><br/> N\u1ebfu quý v\u1ecb ho\u1eb7c b\u1ea5t k\u1ef3 thŕnh vięn nŕo trong h\u1ed9 gia \u0111ěnh c\u1ee7a quý v\u1ecb th\u1ef1c hi\u1ec7n nh\u1eefng \u0111i\u1ec1u sau: </p> <ul class="list--bulleted"><li>\u1ea8n thông tin ho\u1eb7c cung c\u1ea5p thông tin sai l\u1ec7ch</li><li>Trao \u0111\u1ed5i ho\u1eb7c bán phúc l\u1ee3i SNAP ho\u1eb7c th\u1ebb EBT</li><li>S\u1eed d\u1ee5ng phúc l\u1ee3i SNAP \u0111\u1ec3 mua các m\u1eb7t hŕng không h\u1ee3p cách, ch\u1eb3ng h\u1ea1n nh\u01b0 r\u01b0\u1ee3u ho\u1eb7c thu\u1ed1c lá</li><li>S\u1eed d\u1ee5ng Phúc l\u1ee3i SNAP c\u1ee7a ng\u01b0\u1eddi khác </li><li>Thanh toán cho th\u1ef1c ph\u1ea9m mua b\u1eb1ng tín d\u1ee5ng b\u1eb1ng phúc l\u1ee3i SNAP</li><li>Quý v\u1ecb s\u1ebd b\u1ecb thu h\u1ed3i phúc l\u1ee3i SNAP:</p><ul class="list--bulleted"><li>1 n\u0103m cho l\u1ea7n vi ph\u1ea1m \u0111\u1ea7u tięn</li><li>2 n\u0103m cho l\u1ea7n vi ph\u1ea1m th\u1ee9 hai</li><li>V\u0129nh vi\u1ec5n cho l\u1ea7n vi ph\u1ea1m th\u1ee9 ba</li></ul><p>Quý v\u1ecb c\u0169ng có th\u1ec3 b\u1ecb ph\u1ea1t t\u1edbi 250.000 USD ho\u1eb7c b\u1ecb ph\u1ea1t tů t\u1edbi 20 n\u0103m ho\u1eb7c c\u1ea3 hai. Quý v\u1ecb c\u0169ng có th\u1ec3 b\u1ecb c\u1ea5m nh\u1eadn SNAP thęm 18 tháng n\u1ebfu tňa án ra l\u1ec7nh.<br/><br/>N\u1ebfu quý v\u1ecb ho\u1eb7c b\u1ea5t k\u1ef3 thŕnh vięn nŕo trong h\u1ed9 gia \u0111ěnh c\u1ee7a quý v\u1ecb th\u1ef1c hi\u1ec7n nh\u1eefng \u0111i\u1ec1u sau:</p><ul class="list--bulleted"><li>\u0110\u1ed5i tr\u1ee3 c\u1ea5p SNAP \u0111\u1ec3 l\u1ea5y ma túy b\u1ea5t h\u1ee3p pháp vŕ b\u1ecb tňa án k\u1ebft t\u1ed9i</li></ul><p>Quý v\u1ecb s\u1ebd b\u1ecb thu h\u1ed3i phúc l\u1ee3i SNAP:</p><ul class="list--bulleted"><li>2 n\u0103m cho l\u1ea7n vi ph\u1ea1m \u0111\u1ea7u tięn</li><li>V\u0129nh vi\u1ec5n cho l\u1ea7n vi ph\u1ea1m th\u1ee9 hai</li></ul><p>N\u1ebfu quý v\u1ecb ho\u1eb7c b\u1ea5t k\u1ef3 thŕnh vięn nŕo trong h\u1ed9 gia \u0111ěnh c\u1ee7a quý v\u1ecb th\u1ef1c hi\u1ec7n nh\u1eefng \u0111i\u1ec1u sau:</p><ul class="list--bulleted"><li>\u0110\u1ed5i tr\u1ee3 c\u1ea5p SNAP \u0111\u1ec3 l\u1ea5y súng, \u0111\u1ea1n d\u01b0\u1ee3c ho\u1eb7c ch\u1ea5t n\u1ed5 vŕ b\u1ecb tňa án k\u1ebft t\u1ed9i</li><li>Trao \u0111\u1ed5i, mua ho\u1eb7c bán phúc l\u1ee3i SNAP t\u1eeb $500 tr\u1edf lęn vŕ b\u1ecb tňa án k\u1ebft t\u1ed9i</li></ul><p>Quý v\u1ecb s\u1ebd:</p><ul class="list--bulleted"><li>Quý v\u1ecb s\u1ebd b\u1ecb thu h\u1ed3i phúc l\u1ee3i SNAP v\u0129nh vi\u1ec5n</li></ul><p>N\u1ebfu quý v\u1ecb ho\u1eb7c b\u1ea5t k\u1ef3 thŕnh vięn nŕo trong h\u1ed9 gia \u0111ěnh c\u1ee7a quý v\u1ecb lŕm nh\u1eefng \u0111i\u1ec1u sau:</p><ul class="list--bulleted"><li>Cung c\u1ea5p thông tin sai l\u1ec7ch v\u1ec1 quý v\u1ecb lŕ ai ho\u1eb7c n\u01a1i quý v\u1ecb s\u1ed1ng \u0111\u1ec3 nh\u1eadn tr\u1ee3 c\u1ea5p trong nhi\u1ec1u tr\u01b0\u1eddng h\u1ee3p cůng m\u1ed9t lúc</li></ul><p>Quý v\u1ecb s\u1ebd:</p><ul class="list--bulleted"><li>B\u1ecb thu h\u1ed3i phúc l\u1ee3i SNAP trong 10 n\u0103m</li></ul><p>Nh\u1eefng hěnh ph\u1ea1t nŕo \u0111\u01b0\u1ee3c áp d\u1ee5ng trong FITAP vŕ KCSP?</p><p>N\u1ebfu quý v\u1ecb ho\u1eb7c b\u1ea5t k\u1ef3 thŕnh vięn nŕo trong h\u1ed9 gia \u0111ěnh c\u1ee7a quý v\u1ecb th\u1ef1c hi\u1ec7n nh\u1eefng \u0111i\u1ec1u sau:</p><p>Quý v\u1ecb s\u1ebd:</p><ul class="list--bulleted"><li>Gi\u1ea5u thông tin ho\u1eb7c cung c\u1ea5p thông tin sai l\u1ec7ch</li></ul><p>Quý v\u1ecb s\u1ebd:</p><p>B\u1ecb thu h\u1ed3i phúc l\u1ee3i SNAP:</p><ul class="list--bulleted"><li>1 n\u0103m cho l\u1ea7n vi ph\u1ea1m \u0111\u1ea7u tięn</li><li>2 n\u0103m cho l\u1ea7n vi ph\u1ea1m th\u1ee9 hai</li><li>V\u0129nh vi\u1ec5n \u0111\u1ed1i v\u1edbi l\u1ea7n vi ph\u1ea1m th\u1ee9 ba</li></ul><p>Quý v\u1ecb c\u0169ng có th\u1ec3 b\u1ecb ph\u1ea1t t\u1edbi 50.000 USD ho\u1eb7c b\u1ecb ph\u1ea1t tů lęn t\u1edbi 20 n\u0103m ho\u1eb7c c\u1ea3 hai.</p><p>N\u1ebfu quý v\u1ecb ho\u1eb7c b\u1ea5t k\u1ef3 thŕnh vięn nŕo trong h\u1ed9 gia \u0111ěnh c\u1ee7a quý v\u1ecb th\u1ef1c hi\u1ec7n nh\u1eefng vi\u1ec7c sau:</p><ul class="list--bulleted"><li>S\u1eed d\u1ee5ng th\u1ebb EBT c\u1ee7a quý v\u1ecb</li><ul class="list--bulleted"><li>trong c\u1eeda hŕng r\u01b0\u1ee3u,</li><li>trong sňng b\u1ea1c ho\u1eb7c c\u01a1 s\u1edf \u0111ánh b\u1ea1c,</li><li>trong c\u01a1 s\u1edf bán l\u1ebb s\u1ea3n xu\u1ea5t ch\u01b0\u01a1ng trěnh gi\u1ea3i trí dŕnh cho ng\u01b0\u1eddi l\u1edbn trong \u0111ó ng\u01b0\u1eddi bi\u1ec3u di\u1ec5n c\u1edfi qu\u1ea7n áo ho\u1eb7c bi\u1ec3u di\u1ec5n trong těnh tr\u1ea1ng không m\u1eb7c qu\u1ea7n áo vě m\u1ee5c \u0111ích gi\u1ea3i trí ho\u1eb7c</li><li>t\u1ea1i b\u1ea5t k\u1ef3 hi\u1ec7u sách dŕnh cho ng\u01b0\u1eddi l\u1edbn nŕo, b\u1ea5t k\u1ef3 c\u1eeda hŕng \u0111\u1ed3 důng dŕnh cho ng\u01b0\u1eddi l\u1edbn nŕo ho\u1eb7c b\u1ea5t k\u1ef3 c\u01a1 s\u1edf kinh doanh có khuynh h\u01b0\u1edbng těnh d\u1ee5c nŕo,</li><li>cho b\u1ea5t k\u1ef3 hěnh x\u0103m, x\u1ecf khuyęn, ho\u1eb7c c\u01a1 s\u1edf ngh\u1ec7 thu\u1eadt tręn c\u01a1 th\u1ec3,</li><li>t\u1ea1i b\u1ea5t k\u1ef3 ti\u1ec7m lŕm móng nŕo,</li><li>t\u1ea1i b\u1ea5t k\u1ef3 c\u1eeda hŕng trang s\u1ee9c nŕo,</li><li>t\u1ea1i b\u1ea5t k\u1ef3 khu gi\u1ea3i trí ho\u1eb7c trň ch\u01a1i \u0111i\u1ec7n t\u1eed nŕo, </li><li>t\u1ea1i b\u1ea5t k\u1ef3 công ty b\u1ea3o lănh t\u1ea1i ngo\u1ea1i nŕo,</li><li>t\u1ea1i b\u1ea5t k\u1ef3 câu l\u1ea1c b\u1ed9 \u0111ęm, quán bar, quán r\u01b0\u1ee3u ho\u1eb7c quán r\u01b0\u1ee3u nŕo,</li><li>tręn b\u1ea5t k\u1ef3 tŕu du l\u1ecbch nŕo,</li><li>t\u1ea1i b\u1ea5t k\u1ef3 ho\u1ea1t \u0111\u1ed9ng kinh doanh tâm linh nŕo; ho\u1eb7c</li><li>t\u1ea1i b\u1ea5t k\u1ef3 c\u01a1 s\u1edf nŕo không cho phép ng\u01b0\u1eddi d\u01b0\u1edbi 18 tu\u1ed5i, ho\u1eb7c</li><li>t\u1ea1i máy ATM \u1edf b\u1ea5t k\u1ef3 c\u01a1 s\u1edf nŕo trong s\u1ed1 nŕy,</li></ul></ul><ul class="list--bulleted"><li>S\u1eed d\u1ee5ng th\u1ebb EBT c\u1ee7a quý v\u1ecb</li><ul class="list--bulleted"><li>t\u1ea1i b\u1ea5t k\u1ef3 nhŕ bán l\u1ebb nŕo \u0111\u1ed1i v\u1edbi vi\u1ec7c mua \u0111\u1ed3 u\u1ed1ng có c\u1ed3n,</li><li>t\u1ea1i b\u1ea5t k\u1ef3 nhŕ bán l\u1ebb nŕo \u0111\u1ec3 mua s\u1ea3n ph\u1ea9m thu\u1ed1c lá, ho\u1eb7c</li><li>t\u1ea1i b\u1ea5t k\u1ef3 nhŕ bán l\u1ebb nŕo \u0111\u1ec3 mua vé s\u1ed1,</li><li>t\u1ea1i b\u1ea5t k\u1ef3 nhŕ bán l\u1ebb nŕo \u0111\u1ec3 mua \u0111\u1ed3 trang s\u1ee9c.</li></ul></ul><p>Quý v\u1ecb s\u1ebd:</p><p>B\u1ecb thu h\u1ed3i phúc l\u1ee3i SNAP trong:</p><ul class="list--bulleted"><li>1 n\u0103m \u0111\u1ed1i v\u1edbi l\u1ea7n vi ph\u1ea1m \u0111\u1ea7u tięn</li><li>2 n\u0103m \u0111\u1ed1i v\u1edbi l\u1ea7n vi ph\u1ea1m th\u1ee9 hai</li><li>V\u0129nh vi\u1ec5n \u0111\u1ed1i v\u1edbi l\u1ea7n vi ph\u1ea1m th\u1ee9 ba</li></li></ul><p>N\u1ebfu quý v\u1ecb ho\u1eb7c b\u1ea5t k\u1ef3 thŕnh vięn nŕo trong h\u1ed9 gia \u0111ěnh c\u1ee7a quý v\u1ecb th\u1ef1c hi\u1ec7n nh\u1eefng \u0111i\u1ec1u sau:</p><ul class="list--bulleted"><li>Cung c\u1ea5p thông tin sai l\u1ec7ch v\u1ec1 n\u01a1i quý v\u1ecb s\u1ed1ng \u0111\u1ec3 nh\u1eadn tr\u1ee3 c\u1ea5p \u1edf hai ti\u1ec3u bang tr\u1edf lęn cůng m\u1ed9t lúc</li></ul><p>Quý v\u1ecb s\u1ebd: </p> <ul class="list--bulleted"><li>Quý v\u1ecb s\u1ebd b\u1ecb thu h\u1ed3i phúc l\u1ee3i SNAP trong 10 n\u0103m</li></ul>
legal-expanded.header3=Quy ch\u1ebf s\u1eeda \u0111\u1ed5i c\u1ee7a Louisiana 46:56 - Các ch\u01b0\u01a1ng trěnh chia s\u1ebb quy\u1ec1n truy c\u1eadp d\u1eef li\u1ec7u tr\u01b0\u1eddng h\u1ee3p
legal-expanded.body3=<p>Quy\u1ec1n nŕy cho phép các khu v\u1ef1c ch\u01b0\u01a1ng trěnh trong B\u1ed9 chia s\u1ebb quy\u1ec1n truy c\u1eadp vŕo h\u1ed3 s\u01a1 v\u1ee5 vi\u1ec7c c\u1ee7a nhau khi c\u1ea7n thi\u1ebft cho vi\u1ec7c qu\u1ea3n lý các ch\u01b0\u01a1ng trěnh t\u01b0\u01a1ng \u1ee9ng, tr\u1eeb khi b\u1ecb c\u1ea5m b\u1edfi lu\u1eadt pháp ho\u1eb7c quy \u0111\u1ecbnh lięn bang.</p>
legal-expanded.header4=Tuyęn b\u1ed1 không phân bi\u1ec7t \u0111\u1ed1i x\u1eed c\u1ee7a USDA
legal-expanded.body4=<p>Theo lu\u1eadt dân quy\u1ec1n lięn bang vŕ các quy \u0111\u1ecbnh vŕ chính sách v\u1ec1 quy\u1ec1n dân s\u1ef1 c\u1ee7a B\u1ed9 Nông nghi\u1ec7p Hoa K\u1ef3 (USDA), t\u1ed5 ch\u1ee9c nŕy b\u1ecb c\u1ea5m phân bi\u1ec7t \u0111\u1ed1i x\u1eed d\u1ef1a tręn ch\u1ee7ng t\u1ed9c, mŕu da, ngu\u1ed3n g\u1ed1c qu\u1ed1c gia, gi\u1edbi tính (bao g\u1ed3m c\u1ea3 b\u1ea3n d\u1ea1ng gi\u1edbi vŕ khuynh h\u01b0\u1edbng těnh d\u1ee5c), khuy\u1ebft t\u1eadt, tu\u1ed5i tác ho\u1eb7c tr\u1ea3 thů ho\u1eb7c tr\u1ea3 \u0111\u0169a ho\u1ea1t \u0111\u1ed9ng dân quy\u1ec1n tr\u01b0\u1edbc \u0111ây.</p><p>Thông tin v\u1ec1 ch\u01b0\u01a1ng trěnh có th\u1ec3 \u0111\u01b0\u1ee3c cung c\u1ea5p b\u1eb1ng các ngôn ng\u1eef khác ngoŕi ti\u1ebfng Anh. Ng\u01b0\u1eddi khuy\u1ebft t\u1eadt c\u1ea7n các ph\u01b0\u01a1ng ti\u1ec7n lięn l\u1ea1c thay th\u1ebf \u0111\u1ec3 l\u1ea5y thông tin ch\u01b0\u01a1ng trěnh (ví d\u1ee5: ch\u1eef n\u1ed5i Braille, ch\u1eef in l\u1edbn, b\u0103ng ghi âm, Ngôn ng\u1eef ký hi\u1ec7u Hoa K\u1ef3), nęn lięn h\u1ec7 v\u1edbi c\u01a1 quan ti\u1ec3u bang ho\u1eb7c \u0111\u1ecba ph\u01b0\u01a1ng ch\u1ecbu trách nhi\u1ec7m qu\u1ea3n lý ch\u01b0\u01a1ng trěnh ho\u1eb7c Trung tâm TARGET c\u1ee7a USDA theo s\u1ed1 (202) 720- 2600 (tho\u1ea1i vŕ TTY) ho\u1eb7c lięn h\u1ec7 v\u1edbi USDA thông qua D\u1ecbch v\u1ee5 Phięn d\u1ecbch cho ng\u01b0\u1eddi khi\u1ebfm thính Lięn bang theo s\u1ed1 (800) 877-8339.</p><p>\u0110\u1ec3 g\u1eedi khi\u1ebfu n\u1ea1i v\u1ec1 phân bi\u1ec7t \u0111\u1ed1i x\u1eed trong ch\u01b0\u01a1ng trěnh, Ng\u01b0\u1eddi khi\u1ebfu n\u1ea1i ph\u1ea3i \u0111i\u1ec1n vŕo M\u1eabu AD-3027, Ch\u01b0\u01a1ng trěnh USDA M\u1eabu \u0111\u01a1n Khi\u1ebfu n\u1ea1i Phân bi\u1ec7t \u0111\u1ed1i x\u1eed có th\u1ec3 l\u1ea5y tr\u1ef1c tuy\u1ebfn t\u1ea1i: <a target="_blank" rel="noreferrer noopener" href="https://www.usda.gov/sites/default/files/documents/ad-3027.pdf">https://www.usda.gov/sites/default/files/documents/ad-3027.pdf</a>, t\u1eeb b\u1ea5t k\u1ef3 v\u0103n phňng USDA nŕo, b\u1eb1ng cách g\u1ecdi \u0111\u1ebfn s\u1ed1 (866) 632-9992 ho\u1eb7c b\u1eb1ng cách vi\u1ebft th\u01b0 g\u1eedi t\u1edbi USDA. Th\u01b0 ph\u1ea3i có tęn, \u0111\u1ecba ch\u1ec9, s\u1ed1 \u0111i\u1ec7n tho\u1ea1i c\u1ee7a ng\u01b0\u1eddi khi\u1ebfu n\u1ea1i vŕ mô t\u1ea3 b\u1eb1ng v\u0103n b\u1ea3n v\u1ec1 hŕnh \u0111\u1ed9ng b\u1ecb cáo bu\u1ed9c phân bi\u1ec7t \u0111\u1ed1i x\u1eed v\u1edbi \u0111\u1ee7 chi ti\u1ebft \u0111\u1ec3 thông báo cho Tr\u1ee3 lý B\u1ed9 tr\u01b0\u1edfng v\u1ec1 Dân quy\u1ec1n (ASCR) v\u1ec1 tính ch\u1ea5t vŕ ngŕy tháng c\u1ee7a hŕnh vi vi ph\u1ea1m dân quy\u1ec1n b\u1ecb cáo bu\u1ed9c. Bi\u1ec3u m\u1eabu ho\u1eb7c th\u01b0 AD-3027 \u0111ă hoŕn thŕnh ph\u1ea3i \u0111\u01b0\u1ee3c g\u1eedi t\u1edbi USDA tr\u01b0\u1edbc:</p><p>1. <strong>Th\u01b0:</strong> B\u1ed9 Nông nghi\u1ec7p Hoa K\u1ef3<br/>V\u0103n phňng Tr\u1ee3 lý B\u1ed9 tr\u01b0\u1edfng Dân quy\u1ec1n<br/>1400 Independence Avenue, SW<br/>Washington, D.C. 20250-9410; <br/>ho\u1eb7c</p><p>2. <strong>Fax:</strong> (833) 256-1665 ho\u1eb7c (202) 690-7442</p><p>3. <strong>Email:</strong> <a href="mailto:Program.Intake@usda.gov">Program.Intake@usda.gov</a></p><p>T\u1ed5 ch\u1ee9c nŕy lŕ nhŕ cung c\u1ea5p c\u01a1 h\u1ed9i běnh \u0111\u1eb3ng.</p>

signature-title=Ch\u1eef ký
signature-header=Nh\u1eadp tęn pháp lý \u0111\u1ea7y \u0111\u1ee7 c\u1ee7a b\u1ea1n vŕo \u0111ây \u0111\u1ec3 ký vŕo \u0111\u01a1n \u0111\u0103ng ký nŕy.
signature.p1=Khi ký vŕo \u0111\u01a1n \u0111\u0103ng ký nŕy, quý v\u1ecb xác nh\u1eadn r\u1eb1ng quý v\u1ecb ghi thông tin \u0111úng s\u1ef1 th\u1eadt vŕ chính xác vŕo \u0111\u01a1n \u0111\u0103ng ký, bao g\u1ed3m thông tin v\u1ec1 t\u01b0 cách công dân vŕ těnh tr\u1ea1ng không ph\u1ea3i công dân c\u1ee7a ng\u01b0\u1eddi n\u1ed9p \u0111\u01a1n xin SNAP.
signature.p2=N\u1ebfu cung c\u1ea5p thông tin sai l\u1ec7ch, quý v\u1ecb có th\u1ec3 không nh\u1eadn \u0111\u01b0\u1ee3c tr\u1ee3 c\u1ea5p vŕ có th\u1ec3 b\u1ecb truy t\u1ed1 hěnh s\u1ef1.
signature.type-here=Nh\u1eadp tęn pháp lý \u0111\u1ea7y \u0111\u1ee7 c\u1ee7a b\u1ea1n
signature-submit=G\u1eedi \u0111\u01a1n \u0111\u0103ng ký

