footer.digital-assister-statement=\u1ee8ng d\u1ee5ng phúc l\u1ee3i nŕy lŕ m\u1ed9t d\u1ecbch v\u1ee5 \u0111\u01b0\u1ee3c Code for America xây d\u1ef1ng thay m\u1eb7t cho ng\u01b0\u1eddi dân \u1edf bang Louisiana
footer.privacy=Chính Sách v\u1ec1 Quy\u1ec1n Rięng T\u01b0
privacy.title=Chính Sách v\u1ec1 Quy\u1ec1n Rięng T\u01b0
privacy.sub-title=BenefitsLouisiana lŕ m\u1ed9t d\u1ecbch v\u1ee5 \u0111\u01b0\u1ee3c Code for America Labs, Inc. ("Code for America," "chúng tôi," "c\u1ee7a chúng tôi") l\u1eadp ra \u0111\u1ec3:
privacy.info.li1=Giúp quý v\u1ecb nh\u1eadn vŕ duy trě các kho\u1ea3n phúc l\u1ee3i \u1edf Louisiana ("Phúc L\u1ee3i Louisiana" \u0111\u1ec1 c\u1eadp \u0111\u1ebfn t\u1ea5t c\u1ea3 các ch\u01b0\u01a1ng trěnh nh\u01b0 th\u1ebf).
privacy.info.li2=\u0110\u1ec1 ngh\u1ecb các d\u1ecbch v\u1ee5 ho\u1eb7c ch\u01b0\u01a1ng trěnh h\u1ed7 tr\u1ee3 khác có th\u1ec3 h\u1eefu ích cho quý v\u1ecb. Chúng tôi s\u1ebd ch\u1ec9 s\u1eed d\u1ee5ng thông tin cá nhân c\u1ee7a quý v\u1ecb \u0111\u1ec3 gi\u1edbi thi\u1ec7u các d\u1ecbch v\u1ee5 ho\u1eb7c ch\u01b0\u01a1ng trěnh \u0111ó cho quý v\u1ecb nh\u01b0 m\u1ed9t l\u1ef1a ch\u1ecdn. Tuy nhięn, chúng tôi s\u1ebd ch\u1ec9 g\u1eedi thông tin cá nhân c\u1ee7a quý v\u1ecb \u0111\u1ebfn các d\u1ecbch v\u1ee5 ho\u1eb7c ch\u01b0\u01a1ng trěnh khác khi \u0111\u01b0\u1ee3c quý v\u1ecb cho phép.
privacy.info.description.p1=Chính Sách V\u1ec1 Quy\u1ec1n Rięng T\u01b0 nŕy gi\u1ea3i thích cách chúng tôi thu th\u1eadp, s\u1eed d\u1ee5ng, chia s\u1ebb vŕ b\u1ea3o v\u1ec7 thông tin cá nhân c\u1ee7a quý v\u1ecb. Quý v\u1ecb \u0111\u1ed3ng ý v\u1edbi các \u0111i\u1ec1u kho\u1ea3n trong Chính Sách v\u1ec1 Quy\u1ec1n Rięng T\u01b0 nŕy b\u1eb1ng vi\u1ec7c s\u1eed d\u1ee5ng các D\u1ecbch V\u1ee5 c\u1ee7a chúng tôi, vŕ Thông Báo v\u1ec1 Quy\u1ec1n Rięng T\u01b0 nŕy \u0111\u01b0\u1ee3c áp d\u1ee5ng b\u1ea5t k\u1ec3 lo\u1ea1i thi\u1ebft b\u1ecb quý v\u1ecb s\u1eed d\u1ee5ng \u0111\u1ec3 truy c\u1eadp các D\u1ecbch V\u1ee5 c\u1ee7a chúng tôi lŕ gě.
privacy.info.description.p2=N\u1ebfu quý v\u1ecb có b\u1ea5t k\u1ef3 th\u1eafc m\u1eafc ho\u1eb7c quan ng\u1ea1i nŕo v\u1ec1 Thông Báo v\u1ec1 Quy\u1ec1n Rięng T\u01b0 nŕy, vui lňng lięn h\u1ec7 v\u1edbi chúng tôi qua <a href = "mailto: help@benefitslouisiana.org">help@benefitslouisiana.org</a>
privacy.information-we-collect.title=Thông tin mŕ chúng tôi thu th\u1eadp
privacy.information-we-collect.p1=Chúng tôi tuân th\u1ee7 nguyęn t\u1eafc Gi\u1ea3m Thi\u1ec3u D\u1eef Li\u1ec7u trong vi\u1ec7c thu th\u1eadp vŕ s\u1eed d\u1ee5ng thông tin cá nhân c\u1ee7a quý v\u1ecb. Chúng tôi có th\u1ec3 thu th\u1eadp thông tin sau \u0111ây v\u1ec1 quý v\u1ecb, nh\u1eefng ng\u01b0\u1eddi ph\u1ee5 thu\u1ed9c, ho\u1eb7c các thŕnh vięn trong h\u1ed9 gia \u0111ěnh quý v\u1ecb:
privacy.information-we-collect.li1=T\u1ea5t c\u1ea3 thông tin quý v\u1ecb cung c\u1ea5p thông qua Trang Web, bao g\u1ed3m tęn, \u0111\u1ecba ch\u1ec9, thông tin lięn h\u1ec7, s\u1ed1 an sinh xă h\u1ed9i, thông tin tŕi chính, vŕ thông tin t\u01b0\u01a1ng t\u1ef1 \u0111\u1ed1i v\u1edbi các cá nhân khác mŕ quý v\u1ecb cung c\u1ea5p thông tin \u0111\u1ec3 \u0111\u01b0a vŕo \u0111\u01a1n xin Phúc L\u1ee3i Louisiana c\u1ee7a quý v\u1ecb
privacy.information-we-collect.li2=B\u1ea3n sao c\u1ee7a b\u1ea5t k\u1ef3 tŕi li\u1ec7u nŕo quý v\u1ecb t\u1ea3i lęn, nh\u01b0 hěnh ch\u1ee5p gi\u1ea5y phép lái xe, bięn nh\u1eadn ti\u1ec1n l\u01b0\u01a1ng, gi\u1ea5y khai sinh, bięn nh\u1eadn ti\u1ec1n thuę nhŕ, v.v.
privacy.information-we-collect.li3=B\u1ea5t k\u1ef3 tin nh\u1eafn nŕo quý v\u1ecb g\u1eedi cho chúng tôi qua SMS, email, ho\u1eb7c live chat
privacy.information-we-collect.li4=B\u1ea5t k\u1ef3 câu tr\u1ea3 l\u1eddi ho\u1eb7c nh\u1eadn xét nŕo quý v\u1ecb cung c\u1ea5p \u0111\u1ec3 tr\u1ea3 l\u1eddi b\u1ea3n kh\u1ea3o sát mŕ chúng tôi g\u1eedi cho quý v\u1ecb
privacy.information-we-collect.p2=Ngoŕi thông tin quý v\u1ecb cung c\u1ea5p, chúng tôi t\u1ef1 \u0111\u1ed9ng thu th\u1eadp vŕ l\u01b0u tr\u1eef thông tin v\u1ec1 phięn truy c\u1eadp c\u1ee7a quý v\u1ecb vŕo Trang Web:
privacy.information-we-collect.p3=Chúng tôi s\u1ebd không thu th\u1eadp thông tin cá nhân c\u1ee7a quý v\u1ecb n\u1ebfu không có s\u1ef1 \u0111\u1ed3ng ý c\u1ee7a quý v\u1ecb, tr\u1eeb m\u1ed9t s\u1ed1 tr\u01b0\u1eddng h\u1ee3p h\u1ea1n ch\u1ebf, nh\u01b0 \u0111\u01b0\u1ee3c mô t\u1ea3 trong chính sách nŕy.
privacy.information-we-collect.ul2.li1=Thi\u1ebft b\u1ecb t\u1eeb \u0111ó quý v\u1ecb truy c\u1eadp Internet
privacy.information-we-collect.ul2.li2=\u0110\u1ecba ch\u1ec9 IP (\u0111\u1ecba ch\u1ec9 IP hay \u0111\u1ecba ch\u1ec9 giao th\u1ee9c internet lŕ m\u1ed9t con s\u1ed1 \u0111\u01b0\u1ee3c c\u1ea5p t\u1ef1 \u0111\u1ed9ng cho máy tính \u0111\u01b0\u1ee3c k\u1ebft n\u1ed1i v\u1edbi Web)
privacy.information-we-collect.ul2.li3=H\u1ec7 \u0111i\u1ec1u hŕnh tręn máy tính c\u1ee7a quý v\u1ecb vŕ thông tin v\u1ec1 trěnh duy\u1ec7t quý v\u1ecb \u0111ă s\u1eed d\u1ee5ng khi truy c\u1eadp trang web
privacy.information-we-collect.ul2.li4=Ngŕy vŕ gi\u1edd truy c\u1eadp c\u1ee7a quý v\u1ecb
privacy.information-we-collect.ul2.li5=Các trang quý v\u1ecb \u0111ă truy c\u1eadp
privacy.information-we-collect.ul2.li6=\u0110\u1ecba ch\u1ec9 c\u1ee7a trang web \u0111ă k\u1ebft n\u1ed1i quý v\u1ecb v\u1edbi Trang Web (ch\u1eb3ng h\u1ea1n nh\u01b0 google.com ho\u1eb7c bing.com)

privacy.how-we-use.title=Chúng tôi s\u1eed d\u1ee5ng thông tin c\u1ee7a quý v\u1ecb nh\u01b0 th\u1ebf nŕo
privacy.how-we-use.content.p1=Chúng tôi s\u1eed d\u1ee5ng thông tin c\u1ee7a quý v\u1ecb cho m\u1ee5c \u0111ích kinh doanh vŕ l\u1ee3i ích h\u1ee3p pháp c\u1ee7a chúng tôi nh\u01b0:
privacy.how-we-use.content.li1=\u0110\u1ec3 giúp quý v\u1ecb nh\u1eadn vŕ duy trě các kho\u1ea3n phúc l\u1ee3i \u1edf Louisiana, bao g\u1ed3m:
privacy.how-we-use.content.li1.sub1=\u0110\u1ec3 \u0111i\u1ec1n các m\u1eabu \u0111\u01a1n c\u1ea7n thi\u1ebft cho vi\u1ec7c s\u1eed d\u1ee5ng D\u1ecbch V\u1ee5
privacy.how-we-use.content.li1.sub2=\u0110\u1ec3 g\u1eedi tŕi li\u1ec7u vŕ thông tin cá nhân c\u1ee7a quý v\u1ecb cho S\u1edf D\u1ecbch V\u1ee5 Tr\u1ebb Em vŕ Gia \u0110ěnh Louisiana
privacy.how-we-use.content.li1.sub3=\u0110\u1ec3 truy c\u1eadp m\u1ed9t tŕi kho\u1ea3n \u0111\u01b0\u1ee3c lięn k\u1ebft v\u1edbi h\u1ed3 s\u01a1 c\u1ee7a quý v\u1ecb trong h\u1ec7 th\u1ed1ng tr\u1ef1c tuy\u1ebfn c\u1ee7a S\u1edf D\u1ecbch V\u1ee5 Tr\u1ebb Em vŕ Gia \u0110ěnh Louisiana
privacy.how-we-use.content.li1.sub4=\u0110\u1ec3 g\u1eedi cho quý v\u1ecb nh\u1eefng thông báo lięn quan \u0111\u1ebfn \u0111\u01a1n \u0111\u0103ng ký, thông tin c\u1eadp nh\u1eadt, vŕ gia h\u1ea1n phúc l\u1ee3i c\u1ee7a quý v\u1ecb

privacy.how-we-collect.title=Chúng tôi thu th\u1eadp thông tin c\u1ee7a quý v\u1ecb nh\u01b0 th\u1ebf nŕo
privacy.how-we-collect.p1=Chúng tôi thu th\u1eadp thông tin c\u1ee7a quý v\u1ecb t\u1eeb nhi\u1ec1u ngu\u1ed3n khác nhau, ch\u1eb3ng h\u1ea1n nh\u01b0 khi quý v\u1ecb ho\u1eb7c thŕnh vięn h\u1ed9 gia \u0111ěnh c\u1ee7a quý v\u1ecb:
privacy.how-we-collect.li1=Truy c\u1eadp Trang Web c\u1ee7a chúng tôi, \u0111i\u1ec1n vŕo các m\u1eabu \u0111\u01a1n tręn Trang Web c\u1ee7a chúng tôi, ch\u1ecdn nh\u1eadn email ho\u1eb7c tin nh\u1eafn v\u0103n b\u1ea3n, ho\u1eb7c s\u1eed d\u1ee5ng các D\u1ecbch V\u1ee5 c\u1ee7a chúng tôi
privacy.how-we-collect.li2=Cung c\u1ea5p cho chúng tôi các tŕi li\u1ec7u \u0111\u1ec3 s\u1eed d\u1ee5ng các D\u1ecbch V\u1ee5 c\u1ee7a chúng tôi
privacy.how-we-collect.li3=Lięn l\u1ea1c v\u1edbi chúng tôi (ví d\u1ee5 nh\u01b0 qua email, chat, m\u1ea1ng xă h\u1ed9i, ho\u1eb7c cách khác)
privacy.how-we-collect.p2=Chúng tôi c\u0169ng có th\u1ec3 thu th\u1eadp thông tin c\u1ee7a quý v\u1ecb t\u1eeb các bęn th\u1ee9 ba nh\u01b0:
privacy.how-we-collect.li4=Các c\u01a1 quan ti\u1ec3u bang Louisiana ho\u1eb7c các c\u01a1 quan chính ph\u1ee7 khác lięn quan \u0111\u1ebfn các D\u1ecbch V\u1ee5 c\u1ee7a chúng tôi


