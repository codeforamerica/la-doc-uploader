# Citizenship
citizenship.title=Quy\u1ec1n công dân
citizenship.header=T\u1ea5t c\u1ea3 m\u1ecdi ng\u01b0\u1eddi trong gia \u0111ěnh quý v\u1ecb có ph\u1ea3i lŕ công dân Hoa K\u1ef3 không?
citizenship.note=Vi\u1ec7c \u0111\u0103ng ký ho\u1eb7c nh\u1eadn SNAP <b>s\u1ebd không \u1ea3nh h\u01b0\u1edfng</b> těnh tr\u1ea1ng nh\u1eadp c\u01b0 c\u1ee7a quý v\u1ecb.
citizenship.content=Ch\u1ec9 nh\u1eefng ng\u01b0\u1eddi trong h\u1ed9 gia \u0111ěnh quý v\u1ecb mu\u1ed1n nh\u1eadn tr\u1ee3 c\u1ea5p SNAP m\u1edbi c\u1ea7n cung c\u1ea5p cho chúng tôi těnh tr\u1ea1ng di chú vŕ nh\u1eadp c\u01b0 c\u1ee7a h\u1ecd.
citizenship.why-provide=T\u1ea1i sao tôi c\u1ea7n cung c\u1ea5p thông tin nŕy?
citizenship.l1=Chúng tôi có th\u1ec3 c\u1ea7n ki\u1ec3m tra thông tin nŕy v\u1edbi C\u01a1 quan Di trú vŕ Nh\u1eadp t\u1ecbch Hoa K\u1ef3 (USCIS) \u0111\u1ec3 \u0111\u1ea3m b\u1ea3o thông tin \u0111ó chính xác. Thông tin chi ti\u1ebft t\u1eeb USCIS có th\u1ec3 \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn vi\u1ec7c b\u1ea1n có th\u1ec3 nh\u1eadn SNAP hay không vŕ s\u1ed1 ti\u1ec1n b\u1ea1n nh\u1eadn \u0111\u01b0\u1ee3c. 
citizenship.l2=Chúng tôi s\u1ebd <b>không</b> s\u1eed d\u1ee5ng thông tin an sinh xă h\u1ed9i c\u1ee7a quý v\u1ecb \u0111\u1ec3 lŕm vi\u1ec7c v\u1edbi C\u01a1 quan Th\u1ef1c thi Di trú vŕ H\u1ea3i quan Hoa K\u1ef3 (ICE). Tham gia SNAP s\u1ebd không gây b\u1ea5t l\u1ee3i cho vi\u1ec7c n\u1ed9p \u0111\u01a1n xin th\u1ebb xanh ho\u1eb7c quy\u1ec1n công dân c\u1ee7a quý v\u1ecb.
citizenship.l3=Vi\u1ec7c n\u1ed9p \u0111\u01a1n xin ho\u1eb7c nh\u1eadn SNAP s\u1ebd không \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn těnh tr\u1ea1ng nh\u1eadp c\u01b0 c\u1ee7a b\u1ea1n ho\u1eb7c b\u1ea5t k\u1ef3 ai trong nhŕ b\u1ea1n.

