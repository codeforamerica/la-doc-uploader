nola-apply-start.header=Quý v\u1ecb có th\u1ec3 \u0111\u1ee7 \u0111i\u1ec1u ki\u1ec7n tham gia ch\u01b0\u01a1ng trěnh Giáo d\u1ee5c s\u1edbm vŕ Ch\u0103m sóc tr\u1ebb em mi\u1ec5n phí
nola-apply-start.subheader=Thông qua 4 câu tr\u1ea3 l\u1eddi n\u1eefa, chúng tôi có th\u1ec3 ki\u1ec3m tra xem quý v\u1ecb có \u0111\u1ee7 \u0111i\u1ec1u ki\u1ec7n tham gia ch\u01b0\u01a1ng trěnh <b>Ph\u1ee5 n\u1eef, Tr\u1ebb s\u01a1 sinh vŕ Tr\u1ebb em (WIC)</b> ho\u1eb7c <b>Giáo d\u1ee5c s\u1edbm vŕ Ch\u0103m sóc tr\u1ebb em</b> hay không.
nola-apply-start.what-is-wic=Ch\u01b0\u01a1ng trěnh Ph\u1ee5 n\u1eef, Tr\u1ebb s\u01a1 sinh vŕ Tr\u1ebb em (WIC) lŕ gě?
nola-apply-start.what-is-wic-content=Ch\u01b0\u01a1ng trěnh Ph\u1ee5 n\u1eef, Tr\u1ebb s\u01a1 sinh vŕ Tr\u1ebb em (WIC) cung c\u1ea5p ki\u1ebfn th\u1ee9c v\u1ec1 dinh d\u01b0\u1ee1ng, h\u01b0\u1edbng d\u1eabn ch\u0103m sóc s\u1ee9c kh\u1ecfe vŕ th\u1ebb EBT \u0111\u1ec3 thanh toán cho th\u1ef1c ph\u1ea9m lŕnh m\u1ea1nh. Ph\u1ee5 n\u1eef mang thai, ph\u1ee5 n\u1eef mang thai trong 6 tháng qua, tr\u1ebb s\u01a1 sinh vŕ tr\u1ebb em d\u01b0\u1edbi 5 tu\u1ed5i \u0111\u1ec1u có th\u1ec3 \u0111\u1ee7 \u0111i\u1ec1u ki\u1ec7n.
nola-apply-start.what-is-ece=Ch\u01b0\u01a1ng trěnh Giáo d\u1ee5c s\u1edbm vŕ Ch\u0103m sóc tr\u1ebb em (ECE) lŕ gě?
nola-apply-start.what-is-ece-content=Ch\u01b0\u01a1ng trěnh Giáo d\u1ee5c s\u1edbm vŕ Ch\u0103m sóc tr\u1ebb em (ECE) h\u1ed7 tr\u1ee3 giáo d\u1ee5c cho ph\u1ee5 huynh l\u1eabn tr\u1ebb nh\u1ecf vŕ c\u1ea3 ch\u0103m sóc tr\u1ebb em. ECE bao g\u1ed3m các ch\u01b0\u01a1ng trěnh Head Start vŕ Early Head Start dŕnh cho tr\u1ebb em d\u01b0\u1edbi 5 tu\u1ed5i vŕ ph\u1ee5 n\u1eef mang thai.
nola-apply-start.im-interested=Tôi quan tâm

