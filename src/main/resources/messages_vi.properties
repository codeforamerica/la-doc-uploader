index.apply-for-snap.paragraph=<b>SNAP</b> (Ch\u01b0\u01a1ng Trěnh H\u1ed7 Tr\u1ee3 Dinh D\u01b0\u1ee1ng B\u1ed5 Sung) giúp quý v\u1ecb vŕ gia \u0111ěnh có \u0111\u01b0\u1ee3c th\u1ef1c ph\u1ea9m měnh c\u1ea7n. Quý v\u1ecb s\u1ebd nh\u1eadn \u0111\u01b0\u1ee3c th\u1ebb EBT mŕ quý v\u1ecb có th\u1ec3 s\u1eed d\u1ee5ng nh\u01b0 th\u1ebb ghi n\u1ee3 \u0111\u1ec3 mua th\u1ef1c ph\u1ea9m t\u1ea1i h\u1ea7u h\u1ebft các c\u1eeda hŕng vŕ ch\u1ee3 nông s\u1ea3n.
index.assistance-question=Quý v\u1ecb có \u0111ang těm ki\u1ebfm s\u1ef1 h\u1ed7 tr\u1ee3 v\u1edbi các ch\u01b0\u01a1ng trěnh khác không?
