# How this works
how-this-works.title=Cách n\u1ed9p \u0111\u01a1n \u0111\u0103ng kí
how-this-works.header=Cách n\u1ed9p \u0111\u01a1n \u0111\u0103ng kí
how-this-works.subtext=M\u1eabu \u0111\u01a1n nŕy s\u1ebd m\u1ea5t ít h\u01a1n <b>30 phút</b> \u0111\u1ec3 hoŕn thŕnh. <div class="notice-yellow"><span>Trang web nŕy ch\u1ec9 dŕnh cho các \u1ee9ng <b>d\u1ee5ng SNAP m\u1edbi.</b> \u0110\u1ec3 gia h\u1ea1n SNAP, hăy truy c\u1eadp <a target="_blank" rel="noreferrer noopener" href=https://cafe-cp.dcfs.la.gov/selfservice/>LA CAFÉ</a></span></div>
