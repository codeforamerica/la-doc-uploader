# Expedited SNAP
expedited-snap.title=Thông báo kh\u1ea9n
expedited-snap.header=Chúng tôi s\u1ebd ki\u1ec3m tra xem li\u1ec7u b\u1ea1n có th\u1ec3 nh\u1eadn \u0111\u01b0\u1ee3c h\u1ed7 tr\u1ee3 th\u1ef1c ph\u1ea9m c\u1ea5p t\u1ed1c (SNAP) sau 7 ngŕy hay ít h\u01a1n không
expedited-snap.what-is=Ch\u01b0\u01a1ng trěnh SNAP c\u1ea5p t\u1ed1c lŕ gě?
expedited-snap.what-is.content=SNAP c\u1ea5p t\u1ed1c lŕ ch\u01b0\u01a1ng trěnh giúp quý v\u1ecb có th\u1ec3 nh\u1eadn phúc l\u1ee3i h\u1ed7 tr\u1ee3 th\u1ef1c ph\u1ea9m s\u1edbm h\u01a1n. Nh\u1eefng cá nhân \u0111\u1ee7 tięu chu\u1ea9n nh\u1eadn SNAP c\u1ea5p t\u1ed1c có th\u1ec3 \u0111\u01b0\u1ee3c giao th\u1ebb EBT trong t\u1ed1i \u0111a 7 ngŕy.
expedited-snap.who-qualifies=Ai \u0111\u1ee7 tięu chu\u1ea9n nh\u1eadn SNAP c\u1ea5p t\u1ed1c?
expedited-snap.who-qualifies.content=Quý v\u1ecb có th\u1ec3 \u0111\u1ee7 tięu chu\u1ea9n nh\u1eadn SNAP c\u1ea5p t\u1ed1c n\u1ebfu \u0111áp \u1ee9ng b\u1ea5t kě těnh hu\u1ed1ng nŕo sau \u0111ây:
expedited-snap.who-qualifies.li1=M\u1ee9c l\u01b0\u01a1ng hŕng tháng c\u1ee7a quý v\u1ecb th\u1ea5p h\u01a1n $150 vŕ quý v\u1ecb có t\u1ed1i \u0111a $100 ti\u1ec1n ti\u1ebft ki\u1ec7m cá nhân, ti\u1ec1n ngân hŕng hay ti\u1ec1n m\u1eb7t.
expedited-snap.who-qualifies.li2=Chi phí ti\u1ec1n tr\u1ecd ho\u1eb7c th\u1ebf ch\u1ea5p, \u0111i\u1ec7n n\u01b0\u1edbc sinh ho\u1ea1t nhi\u1ec1u h\u01a1n m\u1ee9c thu nh\u1eadp vŕ ti\u1ebft ki\u1ec7m c\u1ee7a quý v\u1ecb.
expedited-snap.who-qualifies.li3=Quý v\u1ecb lŕ ng\u01b0\u1eddi nh\u1eadp c\u01b0 ho\u1eb7c nông dân th\u1eddi v\u1ee5 hi\u1ec7n không có vi\u1ec7c lŕm vŕ có t\u1ed1i \u0111a $100 ti\u1ec1n ti\u1ebft ki\u1ec7m cá nhân, ti\u1ec1n ngân hŕng hay ti\u1ec1n m\u1eb7t.

