# SSN form
ssn-form.title=S\u1ed1 an sinh xă h\u1ed9i
ssn-form.header=S\u1ed1 An Sinh Xă H\u1ed9i (SSN)
ssn-form.subheader=N\u1ebfu b\u1ea1n ho\u1eb7c ai \u0111ó trong gia \u0111ěnh b\u1ea1n có S\u1ed1 An sinh Xă h\u1ed9i (SSN), chúng tôi th\u1ef1c s\u1ef1 khuyęn b\u1ea1n nęn \u0111\u01b0a s\u1ed1 \u0111ó vŕo \u0111ây. Không c\u1ea7n ph\u1ea3i có SSN \u0111\u1ed1i v\u1edbi nh\u1eefng ng\u01b0\u1eddi không ph\u1ea3i lŕ công dân ho\u1eb7c thŕnh vięn h\u1ed9 gia \u0111ěnh không n\u1ed9p \u0111\u01a1n xin tr\u1ee3 c\u1ea5p. <a rel="noreferrer noopener" href="/ssnFAQs">Těm hi\u1ec3u lý do t\u1ea1i sao chúng tôi yęu c\u1ea7u SSN</a>.
ssn-form.ssn-question=S\u1ed1 an sinh xă h\u1ed9i c\u1ee7a ({0}) c\u1ee7a quý v\u1ecb lŕ gě?
ssn-form-household.ssn-question=S\u1ed1 An Sinh Xă H\u1ed9i c\u1ee7a {0} lŕ gě?
ssn-form.note=<p><b>L\u01b0u ý:</b> N\u1ebfu quý v\u1ecb không có s\u1ed1 an sinh xă h\u1ed9i nh\u01b0ng sau \u0111ó l\u1ea1i \u0111\u01b0\u1ee3c xác \u0111\u1ecbnh lŕ \u0111\u1ee7 \u0111i\u1ec1u ki\u1ec7n nh\u1eadn SNAP, quý v\u1ecb s\u1ebd \u0111\u01b0\u1ee3c nhân vięn ph\u1ee5 trách h\u1ed3 s\u01a1 c\u1ee7a quý v\u1ecb c\u1ea5p cho m\u1ed9t s\u1ed1 an sinh xă h\u1ed9i t\u1ea1m th\u1eddi.</p><p><b>Vui lňng h\u1ecfi nhân vięn ph\u1ee5 trách h\u1ed3 s\u01a1 v\u1ec1 s\u1ed1 an sinh xă h\u1ed9i t\u1ea1m th\u1eddi c\u1ee7a quý v\u1ecb trong th\u1eddi gian ph\u1ecfng v\u1ea5n</b> \u0111\u1ec3 l\u1ea5y thông tin.</p>

# SSN faqs
ssn-faqs.title=Câu h\u1ecfi th\u01b0\u1eddng g\u1eb7p v\u1ec1 s\u1ed1 an sinh xă h\u1ed9i
ssn-faqs.header=T\u1ea1i sao chúng tôi yęu c\u1ea7u S\u1ed1 An sinh Xă h\u1ed9i (SSN)
ssn-faqs.accordion1=Tôi có c\u1ea7n cung c\u1ea5p S\u1ed1 An sinh Xă h\u1ed9i (SSN) cho tôi vŕ nh\u1eefng ng\u01b0\u1eddi tôi s\u1ed1ng cůng không?
ssn-faqs.accordion2=T\u1ea1i sao tôi c\u1ea7n SSN?
ssn-faqs.accordion3=T\u1ed5 ch\u1ee9c s\u1ebd lŕm gě v\u1edbi mă s\u1ed1 SSN c\u1ee7a tôi c\u0169ng nh\u01b0 các thông tin khác mŕ tôi cung c\u1ea5p?
ssn-faqs.accordion1.expanded=Ch\u1ec9 nh\u1eefng ng\u01b0\u1eddi trong h\u1ed9 gia \u0111ěnh b\u1ea1n mu\u1ed1n nh\u1eadn tr\u1ee3 c\u1ea5p SNAP m\u1edbi c\u1ea7n cung c\u1ea5p cho chúng tôi SSN c\u1ee7a h\u1ecd. N\u1ebfu b\u1ea1n không th\u1ec3 nh\u1edb SSN ho\u1eb7c ai \u0111ó ch\u01b0a có SSN c\u1ee7a h\u1ecd, b\u1ea1n có th\u1ec3 \u0111\u1ec3 tr\u1ed1ng bây gi\u1edd. Chúng tôi s\u1ebd c\u1ea7n SSN c\u1ee7a m\u1ecdi ng\u01b0\u1eddi ho\u1eb7c m\u1ed9t lý do chính \u0111áng t\u1ea1i sao ai \u0111ó không có SSN tr\u01b0\u1edbc khi chúng tôi có th\u1ec3 quy\u1ebft \u0111\u1ecbnh xem b\u1ea1n có th\u1ec3 nh\u1eadn SNAP hay không.
ssn-faqs.accordion2.expanded=Lu\u1eadt yęu c\u1ea7u t\u1ea5t c\u1ea3 nh\u1eefng ng\u01b0\u1eddi nh\u1eadn tr\u1ee3 c\u1ea5p SNAP ph\u1ea3i có SSN ho\u1eb7c có lý do chính \u0111áng \u0111\u1ec3 không có SSN (ch\u1eb3ng h\u1ea1n nh\u01b0 lŕ tr\u1ebb s\u01a1 sinh). Tęn lu\u1eadt cho phép chúng tôi yęu c\u1ea7u SSN lŕ \u0110\u1ea1o lu\u1eadt Th\u1ef1c ph\u1ea9m vŕ Dinh d\u01b0\u1ee1ng n\u0103m 2008, \u0111ă \u0111\u01b0\u1ee3c s\u1eeda \u0111\u1ed5i, 7 USC 2011\u20132036.
ssn-faqs.accordion3.expanded=\u0110ây lŕ cách chúng tôi s\u1ebd s\u1eed d\u1ee5ng thông tin, bao g\u1ed3m t\u1ea5t c\u1ea3 mă s\u1ed1 SSN mŕ quý v\u1ecb cung c\u1ea5p:
ssn-faqs.accordion3.expanded.li1=Chúng tôi s\u1ebd <b>không</b> s\u1eed d\u1ee5ng thông tin an sinh xă h\u1ed9i c\u1ee7a quý v\u1ecb \u0111\u1ec3 lŕm vi\u1ec7c v\u1edbi C\u01a1 quan Th\u1ef1c thi Di trú vŕ H\u1ea3i quan Hoa K\u1ef3 (ICE). Tham gia SNAP s\u1ebd không gây b\u1ea5t l\u1ee3i cho vi\u1ec7c n\u1ed9p \u0111\u01a1n xin th\u1ebb xanh ho\u1eb7c quy\u1ec1n công dân c\u1ee7a quý v\u1ecb.
ssn-faqs.accordion3.expanded.li2=Chúng tôi s\u1ebd ki\u1ec3m tra chéo v\u1edbi các c\u01a1 s\u1edf d\u1eef li\u1ec7u khác \u0111\u1ec3 \u0111\u1ea3m b\u1ea3o xác th\u1ef1c vŕ xem có thông tin nŕo khác v\u1ec1 quý v\u1ecb hay không. Vi\u1ec7c nŕy s\u1ebd giúp chúng tôi quy\u1ebft \u0111\u1ecbnh có nęn h\u1ed7 tr\u1ee3 SNAP cho quý v\u1ecb. \nChúng tôi důng thông tin quý v\u1ecb cung c\u1ea5p \u0111\u1ec3 qu\u1ea3n lý SNAP vŕ ki\u1ec3m tra xem chúng tôi \u0111ă v\u1eadn hŕnh SNAP chu\u1ea9n hay ch\u01b0a.
ssn-faqs.accordion3.expanded.li3=Chúng tôi có th\u1ec3 chia s\u1ebb thông tin v\u1edbi các c\u01a1 quan Ti\u1ec3u bang ho\u1eb7c Lięn bang khác \u0111\u1ec3 quy\u1ebft \u0111\u1ecbnh vi\u1ec7c h\u1ed7 tr\u1ee3 vŕ ti\u1ebfp t\u1ee5c cung c\u1ea5p SNAP cho quý v\u1ecb.
ssn-faqs.accordion3.expanded.li4=Chúng tôi có th\u1ec3 chia s\u1ebb thông tin v\u1edbi các c\u01a1 quan Ti\u1ec3u bang ho\u1eb7c Lięn bang khác \u0111\u1ec3 quy\u1ebft \u0111\u1ecbnh vi\u1ec7c h\u1ed7 tr\u1ee3 vŕ ti\u1ebfp t\u1ee5c cung c\u1ea5p SNAP cho quý v\u1ecb.
ssn-faqs.accordion3.expanded.li5=Chúng tôi có th\u1ec3 \u0111\u01b0a thông tin cho các nhân vięn ch\u1ea5p pháp \u0111\u1ec3 giúp h\u1ecd b\u1eaft các cá nhân l\u1ea9n tr\u1ed1n pháp lu\u1eadt.
ssn-faqs.accordion3.expanded.li6=Trong tr\u01b0\u1eddng h\u1ee3p chúng tôi cung c\u1ea5p v\u01b0\u1ee3t m\u1ee9c phúc l\u1ee3i SNAP cho quý v\u1ecb, chúng tôi có th\u1ec3 \u0111\u01b0a thông tin quý v\u1ecb cung c\u1ea5p cho các c\u01a1 quan thu h\u1ed3i n\u1ee3 Ti\u1ec3u bang, Lięn bang vŕ t\u01b0 nhân. \u0110i\u1ec1u nŕy lŕ \u0111\u1ec3 h\u1ecd có th\u1ec3 h\u1ee3p tác v\u1edbi quý v\u1ecb trong vi\u1ec7c hoŕn tr\u1ea3 các phúc l\u1ee3i b\u1ecb d\u01b0.


