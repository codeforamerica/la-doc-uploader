household-list.learn-more-l4=<b>Ng\u01b0\u1eddi nh\u1eadp c\u01b0</b>: B\u1ea5t k\u1ef3 ng\u01b0\u1eddi nh\u1eadp c\u01b0 nŕo c\u0169ng có th\u1ec3 ch\u1ecdn không tham gia vŕ s\u1ebd không b\u1ecb h\u1ecfi v\u1ec1 těnh tr\u1ea1ng nh\u1eadp c\u01b0 c\u1ee7a h\u1ecd. H\u1ecd v\u1eabn c\u1ea7n ph\u1ea3i \u0111\u01b0\u1ee3c \u0111\u01b0a vŕo \u1ee9ng d\u1ee5ng nŕy. 
