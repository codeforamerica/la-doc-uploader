privacy.how-we-use.content.li2=\u0110\u1ec3 cung c\u1ea5p s\u1ef1 h\u1ed7 tr\u1ee3 cho quý v\u1ecb trong quy trěnh vŕ lięn l\u1ea1c v\u1edbi quý v\u1ecb
privacy.how-we-use.content.li3=\u0110\u1ec3 theo dői vŕ hi\u1ec3u \u0111\u01b0\u1ee3c Trang Web vŕ các D\u1ecbch V\u1ee5 c\u1ee7a chúng tôi \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng nh\u01b0 th\u1ebf nŕo
privacy.how-we-use.content.li4=\u0110\u1ec3 c\u1ea3i thi\u1ec7n ch\u1ea5t l\u01b0\u1ee3ng ho\u1eb7c ph\u1ea1m vi c\u1ee7a Trang Web ho\u1eb7c các D\u1ecbch V\u1ee5 c\u1ee7a chúng tôi
privacy.how-we-use.content.li5=\u0110\u1ec3 \u0111\u1ec1 ngh\u1ecb các d\u1ecbch v\u1ee5 ho\u1eb7c ch\u01b0\u01a1ng trěnh h\u1ed7 tr\u1ee3 khác có th\u1ec3 h\u1eefu ích cho quý v\u1ecb, n\u1ebfu quý v\u1ecb ch\u1ecdn nh\u1eadn các thông báo nŕy
privacy.how-we-use.content.li6=Cho m\u1ee5c \u0111ích phát hi\u1ec7n, ng\u0103n ch\u1eb7n gian l\u1eadn, vŕ an ninh
privacy.how-we-use.content.li7=\u0110\u1ec3 tuân th\u1ee7 các yęu c\u1ea7u vŕ ngh\u0129a v\u1ee5 pháp lý
privacy.how-we-use.content.li8=\u0110\u1ec3 nghięn c\u1ee9u
privacy.how-we-share-your-info.title=Chúng tôi chia s\u1ebb thông tin c\u1ee7a quý v\u1ecb nh\u01b0 th\u1ebf nŕo
privacy.how-we-share-your-info.p1=Chúng tôi không bán thông tin cá nhân c\u1ee7a quý v\u1ecb.
privacy.how-we-share-your-info.p2=Chúng tôi không chia s\u1ebb thông tin cá nhân v\u1edbi b\u1ea5t k\u1ef3 bęn th\u1ee9 ba nŕo tr\u1eeb tr\u01b0\u1eddng h\u1ee3p \u0111\u01b0\u1ee3c quy \u0111\u1ecbnh trong Chính Sách v\u1ec1 Quy\u1ec1n Rięng T\u01b0 nŕy. Chúng tôi có th\u1ec3 ti\u1ebft l\u1ed9 thông tin cho các nhŕ th\u1ea7u, \u0111\u1ed1i tác, vŕ các t\u1ed5 ch\u1ee9c lięn k\u1ebft \u0111\u1ec3 cung c\u1ea5p các d\u1ecbch v\u1ee5 c\u1ee7a Trang Web. Ví d\u1ee5 nh\u01b0, chúng tôi có th\u1ec3 chia s\u1ebb thông tin c\u1ee7a quý v\u1ecb \u0111\u1ec3:
privacy.how-we-share-your-info.p3=Chúng tôi yęu c\u1ea7u các bęn th\u1ee9 ba thay m\u1eb7t chúng tôi b\u1ea3o m\u1eadt thông tin cá nhân c\u1ee7a quý v\u1ecb vŕ không cho phép các bęn th\u1ee9 ba nŕy s\u1eed d\u1ee5ng ho\u1eb7c chia s\u1ebb thông tin cá nhân c\u1ee7a quý v\u1ecb cho b\u1ea5t k\u1ef3 m\u1ee5c \u0111ích nŕo khác ngoŕi vi\u1ec7c cung c\u1ea5p d\u1ecbch v\u1ee5 thay m\u1eb7t chúng tôi.
privacy.how-we-share-your-info.p4=Chúng tôi có th\u1ec3 chia s\u1ebb thông tin c\u1ee7a quý v\u1ecb v\u1edbi các bęn th\u1ee9 ba trong các tr\u01b0\u1eddng h\u1ee3p c\u1ee5 th\u1ec3, ch\u1eb3ng h\u1ea1n nh\u01b0 khi lu\u1eadt pháp yęu c\u1ea7u ho\u1eb7c vi\u1ec7c chia s\u1ebb s\u1ebd giúp b\u1ea3o v\u1ec7 s\u1ef1 an toŕn, tŕi s\u1ea3n, ho\u1eb7c các quy\u1ec1n c\u1ee7a Code for America, nh\u1eefng ng\u01b0\u1eddi chúng tôi ph\u1ee5c v\u1ee5, các bęn lięn k\u1ebft c\u1ee7a chúng tôi, ho\u1eb7c nh\u1eefng ng\u01b0\u1eddi khác.

privacy.how-we-share-your-info.li1=S\u1edf D\u1ecbch V\u1ee5 Tr\u1ebb Em vŕ Gia \u0110ěnh Louisiana \u0111\u1ec3 cung c\u1ea5p vŕ c\u1ea3i thi\u1ec7n các d\u1ecbch v\u1ee5.
privacy.how-we-share-your-info.li1.sub1=S\u1edf D\u1ecbch V\u1ee5 Tr\u1ebb Em vŕ Gia \u0110ěnh Louisiana có th\u1ec3 s\u1eed d\u1ee5ng các tŕi li\u1ec7u nŕy \u0111\u1ec3 x\u1eed lý \u0111\u01a1n \u0111\u0103ng ký tham gia các ch\u01b0\u01a1ng trěnh phúc l\u1ee3i do h\u1ecd qu\u1ea3n lý.
privacy.how-we-share-your-info.li2=Các bęn th\u1ee9 ba \u0111\u1ec3 g\u1eedi kh\u1ea3o sát, các nhóm t\u1eadp trung, ho\u1eb7c cho các m\u1ee5c \u0111ích hŕnh chính, phân tích, nghięn c\u1ee9u, vŕ ti\u1ebfp th\u1ecb khác. Nh\u1eefng thông tin lięn l\u1ea1c c\u1ee7a bęn th\u1ee9 ba nŕy lŕ \u0111\u1ec3 c\u1ea3i thi\u1ec7n s\u1ea3n ph\u1ea9m, \u0111\u1ec3 těm hi\u1ec3u v\u1ec1 tr\u1ea3i nghi\u1ec7m, vŕ \u0111\u1ec3 c\u1eadp nh\u1eadt cho quý v\u1ecb n\u1ebfu quý v\u1ecb yęu c\u1ea7u thông tin c\u1eadp nh\u1eadt.
privacy.how-we-share-your-info.li3=Các \u0111\u1ed1i tác nghięn c\u1ee9u bęn th\u1ee9 ba cho các m\u1ee5c \u0111ích hŕnh chính, phân tích, vŕ nghięn c\u1ee9u.  Nghięn c\u1ee9u lŕ \u0111\u1ec3 c\u1ea3i thi\u1ec7n s\u1ea3n ph\u1ea9m vŕ \u0111\u1ec3 těm hi\u1ec3u v\u1ec1 tr\u1ea3i nghi\u1ec7m.

privacy.your-info.title=Nh\u1eefng l\u1ef1a ch\u1ecdn c\u1ee7a quý v\u1ecb lięn quan \u0111\u1ebfn thông tin c\u1ee7a quý v\u1ecb
privacy.your-info.p1=Chúng tôi coi tr\u1ecdng vŕ tôn tr\u1ecdng quy\u1ec1n rięng t\u01b0 c\u1ee7a quý v\u1ecb vŕ cung c\u1ea5p cho quý v\u1ecb các l\u1ef1a ch\u1ecdn v\u1ec1 cách chúng tôi thu th\u1eadp, s\u1eed d\u1ee5ng, vŕ chia s\u1ebb thông tin c\u1ee7a quý v\u1ecb.
privacy.your-info.email=Email
privacy.your-info.cookies=Cookie
privacy.your-info.text=Tin Nh\u1eafn SMS Giao D\u1ecbch (Text)
privacy.your-info.email.p1=Chúng tôi s\u1ebd ch\u1ec9 g\u1eedi cho quý v\u1ecb nh\u1eefng email lięn quan \u0111\u1ebfn \u0111\u01a1n \u0111\u0103ng ký ho\u1eb7c tŕi li\u1ec7u mŕ quý v\u1ecb \u0111ă g\u1eedi qua BenefitsLouisiana.
privacy.your-info.email.p2=Chúng tôi s\u1ebd không bao gi\u1edd g\u1eedi cho quý v\u1ecb email ti\u1ebfp th\u1ecb ho\u1eb7c \u0111\u0103ng ký quý v\u1ecb vŕo b\u1ea5t k\u1ef3 danh sách g\u1eedi email nŕo.
privacy.your-info.email.p3=N\u1ebfu quý v\u1ecb chia s\u1ebb thông tin lięn h\u1ec7 c\u1ee7a měnh thông qua BenefitsLouisiana \u0111\u1ec3 cung c\u1ea5p cho S\u1edf D\u1ecbch V\u1ee5 Tr\u1ebb Em vŕ Gia \u0110ěnh Louisiana, h\u1ecd có th\u1ec3 lięn h\u1ec7 v\u1edbi quý v\u1ecb. B\u1ea5t k\u1ef3 s\u1ef1 lięn h\u1ec7 t\u1eeb S\u1edf s\u1ebd tuân theo chính sách v\u1ec1 quy\u1ec1n rięng t\u01b0 c\u1ee7a h\u1ecd.
privacy.your-info.cookies.p1=Cookie lŕ các t\u1eadp tin v\u0103n b\u1ea3n nh\u1ecf mŕ các trang web \u0111\u1eb7t tręn máy tính vŕ thi\u1ebft b\u1ecb di \u0111\u1ed9ng c\u1ee7a nh\u1eefng ai truy c\u1eadp các trang web \u0111ó. Pixel tag (web beacon) lŕ các kh\u1ed1i mă nh\u1ecf \u0111\u01b0\u1ee3c \u0111\u1eb7t tręn các trang web vŕ email.
privacy.your-info.cookies.li1=Chúng tôi s\u1eed d\u1ee5ng cookie vŕ các công ngh\u1ec7 khác nh\u01b0 pixel tag \u0111\u1ec3 ghi nh\u1edb tůy ch\u1ecdn c\u1ee7a quý v\u1ecb, nâng cao tr\u1ea3i nghi\u1ec7m tr\u1ef1c tuy\u1ebfn c\u1ee7a quý v\u1ecb, vŕ thu th\u1eadp d\u1eef li\u1ec7u v\u1ec1 cách quý v\u1ecb s\u1eed d\u1ee5ng Trang Web c\u1ee7a chúng tôi \u0111\u1ec3 c\u1ea3i thi\u1ec7n cách chúng tôi qu\u1ea3ng bá n\u1ed9i dung, ch\u01b0\u01a1ng trěnh, vŕ s\u1ef1 ki\u1ec7n c\u1ee7a měnh.
privacy.your-info.cookies.li2=Vi\u1ec7c quý v\u1ecb s\u1eed d\u1ee5ng các Trang Web c\u1ee7a chúng tôi cho th\u1ea5y quý v\u1ecb \u0111\u1ed3ng ý v\u1edbi vi\u1ec7c s\u1eed d\u1ee5ng Cookie nh\u01b0 th\u1ebf.
privacy.your-info.cookies.p2=H\u1ea7u h\u1ebft các trěnh duy\u1ec7t ban \u0111\u1ea7u \u0111\u1ec1u \u0111\u01b0\u1ee3c cŕi \u0111\u1eb7t ch\u1ea5p nh\u1eadn cookie HTTP. N\u1ebfu quý v\u1ecb mu\u1ed1n h\u1ea1n ch\u1ebf ho\u1eb7c ch\u1eb7n cookie do Trang Web c\u1ee7a chúng tôi ho\u1eb7c b\u1ea5t k\u1ef3 trang web nŕo khác cŕi \u0111\u1eb7t, quý v\u1ecb có th\u1ec3 lŕm nh\u01b0 v\u1eady thông qua thi\u1ebft l\u1eadp trěnh duy\u1ec7t c\u1ee7a quý v\u1ecb. Ch\u1ee9c n\u0103ng 'Tr\u1ee3 Giúp' trong trěnh duy\u1ec7t c\u1ee7a quý v\u1ecb s\u1ebd gi\u1ea3i thích cách th\u1ee9c. Ho\u1eb7c, quý v\u1ecb có th\u1ec3 truy c\u1eadp <a target="_blank" rel="noreferrer noopener" href="https://www.aboutcookies.org/">www.aboutcookies.org</a>, nó có ch\u1ee9a thông tin toŕn di\u1ec7n v\u1ec1 cách th\u1ef1c hi\u1ec7n vi\u1ec7c nŕy tręn các trěnh duy\u1ec7t khác nhau. Quý v\u1ecb s\u1ebd těm th\u1ea5y thông tin chung v\u1ec1 cookie vŕ chi ti\u1ebft v\u1ec1 cách xóa cookie kh\u1ecfi máy c\u1ee7a měnh.
privacy.your-info.text.p1=S\u1edf D\u1ecbch V\u1ee5 Tr\u1ebb Em vŕ Gia \u0110ěnh có th\u1ec3 g\u1eedi tin nh\u1eafn v\u0103n b\u1ea3n cho quý v\u1ecb b\u1eb1ng cách s\u1eed d\u1ee5ng các chi ti\u1ebft lięn l\u1ea1c mŕ quý v\u1ecb \u0111ă cung c\u1ea5p khi n\u1ed9p \u0111\u01a1n xin phúc l\u1ee3i. Chúng tôi không ki\u1ec3m soát n\u1ed9i dung ho\u1eb7c th\u1eddi gian c\u1ee7a nh\u1eefng tin nh\u1eafn \u0111ó vŕ các tin nh\u1eafn \u0111\u01b0\u1ee3c g\u1eedi t\u1eeb S\u1edf s\u1ebd tuân theo các \u0110i\u1ec1u Kho\u1ea3n vŕ \u0110i\u1ec1u Ki\u1ec7n c\u1ee7a h\u1ecd.
privacy.your-info.analytics=Phân tích
privacy.your-info.analytics.p1=Chúng tôi s\u1eed d\u1ee5ng MixPanel vŕ Google Analytics \u0111\u1ec3 hi\u1ec3u \u0111\u01b0\u1ee3c khách truy c\u1eadp s\u1eed d\u1ee5ng trang web c\u1ee7a chúng tôi nh\u01b0 th\u1ebf nŕo vŕ \u0111\u1ec3 thu th\u1eadp các ch\u1ec9 s\u1ed1 hi\u1ec7u su\u1ea5t t\u1ed5ng h\u1ee3p. \u0110\u1ec3 těm hi\u1ec3u thęm v\u1ec1 các ph\u01b0\u01a1ng pháp b\u1ea3o v\u1ec7 quy\u1ec1n rięng t\u01b0 c\u1ee7a MixPanel vŕ b\u1ea5t k\u1ef3 l\u1ef1a ch\u1ecdn t\u1eeb ch\u1ed1i nŕo mŕ nó cung c\u1ea5p, hăy nh\u1ea5p vŕo <a href="https://mixpanel.com/legal/privacy-policy/">\u0110ÂY</a>. \u0110\u1ec3 těm hi\u1ec3u thęm v\u1ec1 các ph\u01b0\u01a1ng pháp b\u1ea3o v\u1ec7 quy\u1ec1n rięng t\u01b0 c\u1ee7a Google Analytics vŕ b\u1ea5t k\u1ef3 l\u1ef1a ch\u1ecdn t\u1eeb ch\u1ed1i nŕo mŕ nó cung c\u1ea5p, hăy nh\u1ea5p vŕo <a href="https://policies.google.com/privacy?hl=en-US">\u0110ÂY</a>. Quý v\u1ecb c\u0169ng có th\u1ec3 g\u1eedi email \u0111\u1ebfn <a href = "mailto: help@benefitslouisiana.org">help@benefitslouisiana.org</a> \u0111\u1ec3 bi\u1ebft thęm thông tin.
privacy.la-dcfs.website=Trang Web c\u1ee7a S\u1edf D\u1ecbch V\u1ee5 Tr\u1ebb Em vŕ Gia \u0110ěnh Louisiana
privacy.la-dcfs.website.p1=M\u1ed9t khi S\u1edf D\u1ecbch V\u1ee5 Tr\u1ebb Em vŕ Gia \u0110ěnh Louisiana nh\u1eadn \u0111\u01b0\u1ee3c thông tin cá nhân c\u1ee7a quý v\u1ecb, thông tin \u0111ó s\u1ebd tuân theo Tuyęn B\u1ed1 v\u1ec1 Quy\u1ec1n Truy C\u1eadp Web vŕ Quy\u1ec1n Rięng T\u01b0 c\u1ee7a h\u1ecd.
privacy.additional-services=Các D\u1ecbch V\u1ee5 vŕ Tŕi Nguyęn B\u1ed5 Sung
privacy.additional-services.p1=Chúng tôi có th\u1ec3 cung c\u1ea5p các lięn k\u1ebft b\u1ed5 sung \u0111\u1ebfn các tŕi nguyęn mŕ quý v\u1ecb s\u1ebd th\u1ea5y h\u1eefu ích. Các lięn k\u1ebft nŕy có th\u1ec3 d\u1eabn quý v\u1ecb \u0111\u1ebfn các trang web không lięn k\u1ebft v\u1edbi chúng tôi vŕ/ho\u1eb7c ho\u1ea1t \u0111\u1ed9ng theo các ph\u01b0\u01a1ng pháp b\u1ea3o v\u1ec7 quy\u1ec1n rięng t\u01b0 khác. Chúng tôi không ch\u1ecbu trách nhi\u1ec7m \u0111\u1ed1i v\u1edbi n\u1ed9i dung ho\u1eb7c ph\u01b0\u01a1ng pháp b\u1ea3o v\u1ec7 quy\u1ec1n rięng t\u01b0 c\u1ee7a các trang web khác nh\u01b0 th\u1ebf. Chúng tôi khuy\u1ebfn khích khách truy c\u1eadp vŕ ng\u01b0\u1eddi důng l\u01b0u ý khi h\u1ecd r\u1eddi kh\u1ecfi trang web c\u1ee7a chúng tôi vŕ \u0111\u1ecdc các \u0111i\u1ec1u kho\u1ea3n v\u1ec1 quy\u1ec1n rięng t\u01b0 c\u1ee7a b\u1ea5t k\u1ef3 trang web nŕo khác, vě chúng tôi không ki\u1ec3m soát cách thu th\u1eadp thông tin cá nhân c\u1ee7a các trang web khác.
privacy.how-we-protect=Chúng tôi b\u1ea3o v\u1ec7 thông tin c\u1ee7a quý v\u1ecb nh\u01b0 th\u1ebf nŕo
privacy.how-we-protect.p1=B\u1ea3o v\u1ec7 thông tin cá nhân c\u1ee7a quý v\u1ecb lŕ vô cůng quan tr\u1ecdng, do \u0111ó chúng tôi th\u1ef1c hi\u1ec7n các bi\u1ec7n pháp \u0111\u1ec1 phňng v\u1ec1 m\u1eb7t hŕnh chính, k\u1ef9 thu\u1eadt, vŕ v\u1eadt lý h\u1ee3p lý \u0111\u1ec3 b\u1ea3o v\u1ec7 d\u1eef li\u1ec7u tr\u1ef1c tuy\u1ebfn vŕ ngo\u1ea1i tuy\u1ebfn c\u1ee7a quý v\u1ecb.
privacy.how-we-protect.p2=Tuy nhięn, không có h\u1ec7 th\u1ed1ng nŕo có th\u1ec3 \u0111\u01b0\u1ee3c \u0111\u1ea3m b\u1ea3o an toŕn 100%. N\u1ebfu quý v\u1ecb có th\u1eafc m\u1eafc v\u1ec1 b\u1ea3o m\u1eadt thông tin cá nhân c\u1ee7a měnh ho\u1eb7c n\u1ebfu quý v\u1ecb có lý do cho r\u1eb1ng thông tin cá nhân mŕ chúng tôi l\u01b0u gi\u1eef v\u1ec1 quý v\u1ecb không cňn an toŕn n\u1eefa, vui lňng lięn h\u1ec7 v\u1edbi chúng tôi ngay l\u1eadp t\u1ee9c, nh\u01b0 \u0111\u01b0\u1ee3c mô t\u1ea3 trong Thông Báo v\u1ec1 Quy\u1ec1n Rięng T\u01b0 nŕy.
privacy.data-retention.title=L\u01b0u Gi\u1eef D\u1eef Li\u1ec7u
privacy.data-retention.p1=Chúng tôi s\u1ebd l\u01b0u gi\u1eef thông tin c\u1ee7a quý v\u1ecb trong th\u1eddi gian c\u1ea7n thi\u1ebft \u0111\u1ec3: cung c\u1ea5p các D\u1ecbch V\u1ee5 cho quý v\u1ecb, \u0111i\u1ec1u hŕnh ho\u1ea1t \u0111\u1ed9ng kinh doanh c\u1ee7a chúng tôi phů h\u1ee3p v\u1edbi Thông Báo nŕy, ho\u1eb7c ch\u1ee9ng minh s\u1ef1 tuân th\u1ee7 lu\u1eadt pháp vŕ các ngh\u0129a v\u1ee5 pháp lý.
privacy.childrens-privacy.title=Quy\u1ec1n Rięng T\u01b0 c\u1ee7a Tr\u1ebb Em
privacy.childrens-privacy.p1=Chúng tôi không c\u1ed1 ý thu th\u1eadp thông tin cá nhân t\u1eeb tr\u1ebb v\u1ecb thŕnh nięn d\u01b0\u1edbi 16 tu\u1ed5i ch\u01b0a \u0111\u01b0\u1ee3c công nh\u1eadn quy\u1ec1n t\u1ef1 do.
privacy.access-request.title=Yęu C\u1ea7u Truy C\u1eadp
privacy.access-request.p1=BenefitsLouisiana tôn tr\u1ecdng quy\u1ec1n ki\u1ec3m soát c\u1ee7a quý v\u1ecb \u0111\u1ed1i v\u1edbi thông tin c\u1ee7a měnh vŕ theo yęu c\u1ea7u, chúng tôi s\u1ebd xác nh\u1eadn li\u1ec7u chúng tôi có gi\u1eef ho\u1eb7c \u0111ang x\u1eed lý thông tin mŕ chúng tôi \u0111ă thu th\u1eadp t\u1eeb quý v\u1ecb hay không. Quý v\u1ecb c\u0169ng có quy\u1ec1n s\u1eeda \u0111\u1ed5i ho\u1eb7c c\u1eadp nh\u1eadt d\u1eef li\u1ec7u cá nhân không chính xác ho\u1eb7c không \u0111\u1ea7y \u0111\u1ee7, yęu c\u1ea7u xóa thông tin cá nhân c\u1ee7a quý v\u1ecb, ho\u1eb7c yęu c\u1ea7u chúng tôi không s\u1eed d\u1ee5ng thông tin \u0111ó n\u1eefa. Trong các tr\u01b0\u1eddng h\u1ee3p nh\u1ea5t \u0111\u1ecbnh, chúng tôi không th\u1ec3 \u0111áp \u1ee9ng yęu c\u1ea7u c\u1ee7a quý v\u1ecb, ch\u1eb3ng h\u1ea1n nh\u01b0 n\u1ebfu yęu c\u1ea7u \u0111ó c\u1ea3n tr\u1edf các ngh\u0129a v\u1ee5 c\u1ee7a chúng tôi theo quy \u0111\u1ecbnh, \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn các v\u1ea5n \u0111\u1ec1 pháp lý, chúng tôi không th\u1ec3 xác minh danh tính c\u1ee7a quý v\u1ecb ho\u1eb7c c\u1ea7n nhi\u1ec1u chi phí ho\u1eb7c công s\u1ee9c. Tuy nhięn, trong b\u1ea5t k\u1ef3 tr\u01b0\u1eddng h\u1ee3p nŕo, chúng tôi s\u1ebd tr\u1ea3 l\u1eddi yęu c\u1ea7u c\u1ee7a quý v\u1ecb trong m\u1ed9t khung th\u1eddi gian h\u1ee3p lý vŕ gi\u1ea3i thích cho quý v\u1ecb . \u0110\u1ec3 th\u1ef1c hi\u1ec7n m\u1ed9t yęu c\u1ea7u nh\u01b0 th\u1ebf, vui lňng g\u1eedi email cho chúng tôi t\u1ea1i <a href = "mailto: help@benefitslouisiana.org">help@benefitslouisiana.org</a>.
privacy.access-request.p2=Vui lňng l\u01b0u ý r\u1eb1ng \u0111\u1ed1i v\u1edbi thông tin cá nhân v\u1ec1 quý v\u1ecb mŕ chúng tôi \u0111ă thu th\u1eadp ho\u1eb7c nh\u1eadn \u0111\u1ec3 x\u1eed lý thay m\u1eb7t cho m\u1ed9t th\u1ef1c th\u1ec3 rięng bi\u1ec7t, không lięn k\u1ebft--\u0111ă xác \u0111\u1ecbnh ph\u01b0\u01a1ng ti\u1ec7n vŕ m\u1ee5c \u0111ích c\u1ee7a vi\u1ec7c x\u1eed lý, t\u1ea5t c\u1ea3 các yęu c\u1ea7u nh\u01b0 v\u1eady ph\u1ea3i \u0111\u01b0\u1ee3c g\u1eedi tr\u1ef1c ti\u1ebfp cho th\u1ef1c th\u1ec3 \u0111ó. Chúng tôi s\u1ebd tôn tr\u1ecdng vŕ h\u1ed7 tr\u1ee3 b\u1ea5t k\u1ef3 h\u01b0\u1edbng d\u1eabn nŕo h\u1ecd cung c\u1ea5p lięn quan \u0111\u1ebfn thông tin cá nhân c\u1ee7a quý v\u1ecb.
privacy.changes.title=Nh\u1eefng thay \u0111\u1ed5i
privacy.changes.p1=Chúng tôi \u0111ôi khi có th\u1ec3 thay \u0111\u1ed5i Chính Sách v\u1ec1 Quy\u1ec1n Rięng T\u01b0 nŕy. Vui lňng ki\u1ec3m tra trang nŕy th\u01b0\u1eddng xuyęn \u0111\u1ec3 bi\u1ebft thông tin c\u1eadp nh\u1eadt, vě vi\u1ec7c quý v\u1ecb ti\u1ebfp t\u1ee5c s\u1eed d\u1ee5ng Trang Web sau khi có b\u1ea5t k\u1ef3 thay \u0111\u1ed5i nŕo trong Chính Sách v\u1ec1 Quy\u1ec1n Rięng T\u01b0 nŕy s\u1ebd c\u1ea5u thŕnh vi\u1ec7c quý v\u1ecb ch\u1ea5p nh\u1eadn các thay \u0111\u1ed5i \u0111ó. Chúng tôi s\u1ebd thông báo cho quý v\u1ecb qua email ho\u1eb7c các ph\u01b0\u01a1ng ti\u1ec7n khác phů h\u1ee3p v\u1edbi lu\u1eadt hi\u1ec7n hŕnh v\u1ec1 b\u1ea5t k\u1ef3 thay \u0111\u1ed5i quan tr\u1ecdng nŕo \u0111\u1ed1i v\u1edbi chính sách nŕy.
privacy.effective-date.title=Ngŕy Có Hi\u1ec7u L\u1ef1c
privacy.effective-date.p1=Phięn b\u1ea3n c\u1ee7a chính sách nŕy có hi\u1ec7u l\u1ef1c t\u1eeb ngŕy 1 tháng 3, 2023.
privacy.questions.title=Th\u1eafc m\u1eafc
privacy.questions.p1=N\u1ebfu quý v\u1ecb có b\u1ea5t k\u1ef3 th\u1eafc m\u1eafc, nh\u1eadn xét, quan ng\u1ea1i, ho\u1eb7c khi\u1ebfu n\u1ea1i nŕo v\u1edbi Trang Web, vui lňng lięn h\u1ec7 v\u1edbi chúng tôi qua email t\u1ea1i <a href = "mailto: help@benefitslouisiana.org">help@benefitslouisiana.org</a>.
privacy.questions.p2=Chúng tôi s\u1ebd c\u1ed1 g\u1eafng h\u1ebft s\u1ee9c \u0111\u1ec3 gi\u1ea3i quy\u1ebft v\u1ea5n \u0111\u1ec1.

