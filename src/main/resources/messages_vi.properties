jefferson-ece.subheader=Nh\u1eefng ch\u01b0\u01a1ng tr\u00ecnh n\u00e0y c\u00f3 th\u1ec3:<ul class=\"list--bulleted\"> <li>Cung c\u1ea5p ch\u0103m s\u00f3c tr\u1ebb em v\u00e0 gi\u00e1o d\u1ee5c mi\u1ec5n ph\u00ed cho tr\u1ebb t\u1eeb s\u01a1 sinh \u0111\u1ebfn 4 tu\u1ed5i</li> <li>Cung c\u1ea5p m\u1ea7m non \u1edf Head Start, trung t\u00e2m ch\u0103m s\u00f3c tr\u1ebb, tr\u01b0\u1eddng c\u00f4ng, ho\u1eb7c tr\u01b0\u1eddng t\u01b0 th\u1ee7c cho tr\u1ebb 4 tu\u1ed5i</li></ul>
jefferson-ece.would-you-like=B\u1ea1n c\u00f3 mu\u1ed1n ch\u00fang t\u00f4i g\u1ed1i th\u00f4ng tin c\u1ee7a b\u1ea1n \u0111\u1ebfn M\u1ea1ng l\u01b0\u1ee3i M\u1ea7m non S\u1ed1m Jefferson \u0111\u1ec3 gi\u00fap ho\u00e0n th\u00e0nh \u0111\u01a1n \u0111\u0103ng k\u00fd ch\u0103m s\u00f3c tr\u1ebb em mi\u1ec5n ph\u00ed c\u1ee7a b\u1ea1n kh\u00f4ng?
jefferson-ece.would-you-like-help=M\u1ea1ng l\u01b0\u1ee3i M\u1ea7m non S\u1ed1m Jefferson s\u1ebd li\u00ean h\u1ec7 v\u1edbi b\u1ea1n \u0111\u1ec3 ho\u00e0n t\u1ea5t \u0111\u01a1n \u0111\u0103ng k\u00fd.
jefferson-ece-links.at-the-end-of-this-app=\u1edb cu\u1ed1i \u0111\u01a1n n\u00e0y, ch\u00fang t\u00f4i s\u1ebd hi\u1ec3n th\u1ecb cho b\u1ea1n m\u1ed9t li\u00ean k\u1ebft c\u00f3 th\u1ec3 nh\u1ea5p \u0111\u1ec3 \u0111\u1ebfn \u0111\u01a1n \u0111\u0103ng k\u00fd M\u1ea7m non S\u1ed1m Qu\u1eadn Jefferson (www.jeffersonchild.com)

nola-notice-confirmation=<b>Ch\u0103m sĂłc tr\u1ebb em ho\u1eb7c GiĂˇo d\u1ee5c m\u1eabu giĂˇo mi\u1ec5n phĂ­: QuĂ˝ v\u1ecb ph\u1ea3i cĂąng Tr\u01b0\u1eddng cĂ´ng l\u1eadp New Orleans hoĂ n t\u1ea5t \u0111\u01a1n \u0111\u0103ng kĂ˝.</b> NOLA-PS s\u1ebd g\u1eedi tin nh\u1eafn t\u1edbi quĂ˝ v\u1ecb trong vĂ˛ng m\u1ed9t tu\u1ea7n, kĂ¨m theo liĂŞn k\u1ebft \u0111\u1ec3 hoĂ n t\u1ea5t \u0111\u01a1n \u0111\u0103ng kĂ˝ vĂ  li\u1ec7t kĂŞ cĂˇc ch\u01b0\u01a1ng trĂ¬nh ch\u0103m sĂłc tr\u1ebb em vĂ  giĂˇo d\u1ee5c m\u1eabu giĂˇo mĂ  quĂ˝ v\u1ecb mu\u1ed1n \u0111\u0103ng kĂ˝. <br/><br/>Trong th\u1eddi gian ch\u1edd, quĂ˝ v\u1ecb cĂł th\u1ec3 truy c\u1eadp <a target="_blank" href="nola.explore.avela.org">nola.explore.avela.org</a> \u0111\u1ec3 tĂ¬m ch\u01b0\u01a1ng trĂ¬nh mĂ¬nh mu\u1ed1n!
ece-notice-confirmation=<b>Ch\u0103m sóc tr\u1ebb em ho\u1eb7c Giáo d\u1ee5c m\u1eabu giáo mi\u1ec5n phí: Quý v\u1ecb ph\u1ea3i cůng Tr\u01b0\u1eddng công l\u1eadp New Orleans hoŕn t\u1ea5t \u0111\u01a1n \u0111\u0103ng ký.</b> NOLA-PS s\u1ebd g\u1eedi tin nh\u1eafn t\u1edbi quý v\u1ecb trong vňng m\u1ed9t tu\u1ea7n, kčm theo lięn k\u1ebft \u0111\u1ec3 hoŕn t\u1ea5t \u0111\u01a1n \u0111\u0103ng ký vŕ li\u1ec7t kę các ch\u01b0\u01a1ng trěnh ch\u0103m sóc tr\u1ebb em vŕ giáo d\u1ee5c m\u1eabu giáo mŕ quý v\u1ecb mu\u1ed1n \u0111\u0103ng ký. <br/><br/>Trong th\u1eddi gian ch\u1edd, quý v\u1ecb có th\u1ec3 truy c\u1eadp <a target="_blank" href="nola.explore.avela.org">nola.explore.avela.org</a> \u0111\u1ec3 těm ch\u01b0\u01a1ng trěnh měnh mu\u1ed1n!
wic-notice-confirmation=<b>WIC: Quý v\u1ecb ph\u1ea3i cůng S\u1edf Y t\u1ebf Louisiana hoŕn t\u1ea5t \u0111\u01a1n \u0111\u0103ng ký.</b> Nhân vięn phňng khám WIC s\u1ebd lięn h\u1ec7 v\u1edbi quý v\u1ecb \u0111\u1ec3 x\u1ebfp l\u1ecbch hoŕn t\u1ea5t các b\u01b0\u1edbc cu\u1ed1i cůng.<br/><br/>Quý v\u1ecb c\u0169ng có th\u1ec3 g\u1ecdi tr\u1ef1c ti\u1ebfp \u0111\u1ebfn phňng khám WIC trong khu v\u1ef1c \u0111\u1ec3 \u0111\u1eb7t l\u1ecbch h\u1eb9n tr\u1ef1c ti\u1ebfp. <a target="_blank" href="https://louisianawic.org/search-tool/">Xem b\u1ea3n \u0111\u1ed3 nŕy</a> \u0111\u1ec3 těm phňng khám g\u1ea7n quý v\u1ecb.
confirmation-what-to-expect-after=Các b\u01b0\u1edbc ti\u1ebfp theo sau \u0111ó
confirmation-for-snap=<b>\u0110\u1ed1i v\u1edbi SNAP</b>
confirmation-for-snap-questions=<b>\u0110\u1ed1i v\u1edbi các câu h\u1ecfi c\u1ee7a SNAP</b>
jefferson-ece-notice-confirmation=jefferson-ece-notice-confirmation=<b>Ch\u01b0\u01a1ng tr\u00ecnh ch\u0103m s\u00f3c tr\u1ebb ho\u1eb7c m\u1eabu gi\u00e1o mi\u1ec5n ph\u00ed: B\u1ea1n c\u1ea7n ho\u00e0n th\u00e0nh \u0111\u01a1n \u0111\u0103ng k\u00fd c\u1ee7a m\u00ecnh v\u1edbi M\u1ea1ng l\u01b0\u1edbi Gi\u00e1o d\u1ee5c M\u1ea7m non Jefferson.</b> B\u1ea1n s\u1ebd nh\u1eadn \u0111\u01b0\u1ee3c cu\u1ed9c g\u1ecdi t\u1eeb M\u1ea1ng l\u01b0\u1edbi Gi\u00e1o d\u1ee5c M\u1ea7m non Jefferson trong v\u00f2ng m\u1ed9t tu\u1ea7n \u0111\u1ec3 h\u1ed7 tr\u1ee3 b\u1ea1n ho\u00e0n th\u00e0nh \u0111\u01a1n \u0111\u0103ng k\u00fd v\u00e0 cung c\u1ea5p cho b\u1ea1n danh s\u00e1ch c\u00e1c ch\u01b0\u01a1ng tr\u00ecnh ch\u0103m s\u00f3c tr\u1ebb v\u00e0/ho\u1eb7c m\u1eabu gi\u00e1o m\u00e0 b\u1ea1n c\u00f3 th\u1ec3 \u0111\u1ee7 \u0111i\u1ec1u ki\u1ec7n.<br/><br/> Trong khi ch\u1edd \u0111\u1ee3i, b\u1ea1n c\u00f3 th\u1ec3 truy c\u1eadp <a target="_blank" href="https://www.jeffersonchild.com">www.jeffersonchild.com</a> \u0111\u1ec3 kh\u00e1m ph\u00e1 c\u00e1c l\u1ef1a ch\u1ecdn c\u1ee7a m\u00ecnh. Vui l\u00f2ng g\u1ecdi <a href="tel:504-349-8921">504-349-8921</a> n\u1ebfu b\u1ea1n c\u00f3 th\u00eam c\u00e2u h\u1ecfi n\u00e0o.

you-might-qualify-wic=Quý v\u1ecb có th\u1ec3 \u0111\u1ee7 \u0111i\u1ec1u ki\u1ec7n tham gia ch\u01b0\u01a1ng trěnh Ph\u1ee5 n\u1eef, Tr\u1ebb s\u01a1 sinh vŕ Tr\u1ebb em (WIC)
go-to-wic-button=Chuy\u1ec3n \u0111\u1ebfn \u0111\u01a1n \u0111\u0103ng ký WIC
reveal-content-3=Ch\u01b0\u01a1ng trěnh Ph\u1ee5 n\u1eef, Tr\u1ebb s\u01a1 sinh vŕ Tr\u1ebb em (WIC) giúp m\u1ecdi ng\u01b0\u1eddi thanh toán ti\u1ec1n mua hŕng t\u1ea1p hóa vŕ cung c\u1ea5p ki\u1ebfn th\u1ee9c v\u1ec1 dinh d\u01b0\u1ee1ng cho ph\u1ee5 n\u1eef mang thai, ph\u1ee5 n\u1eef mang thai trong 6 tháng, tr\u1ebb s\u01a1 sinh vŕ tr\u1ebb em d\u01b0\u1edbi 5 tu\u1ed5i.
reveal-content-4=Ch\u01b0\u01a1ng trěnh Giáo d\u1ee5c s\u1edbm vŕ Ch\u0103m sóc tr\u1ebb em (ECE) h\u1ed7 tr\u1ee3 giáo d\u1ee5c cho ph\u1ee5 huynh l\u1eabn tr\u1ebb nh\u1ecf vŕ c\u1ea3 ch\u0103m sóc tr\u1ebb em. ECE bao g\u1ed3m các ch\u01b0\u01a1ng trěnh Head Start vŕ Early Head Start dŕnh cho tr\u1ebb em d\u01b0\u1edbi 5 tu\u1ed5i vŕ ph\u1ee5 n\u1eef mang thai.

