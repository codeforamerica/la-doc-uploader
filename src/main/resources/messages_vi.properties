voter-registration.header=N\u1ebfu quý v\u1ecb ch\u01b0a \u0111\u0103ng ký b\u1ecf phi\u1ebfu t\u1ea1i n\u01a1i quý v\u1ecb \u0111ang s\u1ed1ng, quý v\u1ecb có mu\u1ed1n \u0111\u0103ng ký b\u1ecf phi\u1ebfu t\u1ea1i \u0111ây ngay hôm nay không?
voter-registration.subheader=Vi\u1ec7c n\u1ed9p \u0111\u01a1n \u0111\u0103ng ký ho\u1eb7c t\u1eeb ch\u1ed1i \u0111\u0103ng ký b\u1ecf phi\u1ebfu s\u1ebd không \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn s\u1ed1 ti\u1ec1n tr\u1ee3 c\u1ea5p mŕ c\u01a1 quan nŕy s\u1ebd cung c\u1ea5p cho quý v\u1ecb.
voter-registration.yes=Có, tôi mu\u1ed1n \u0111\u0103ng ký b\u1ecf phi\u1ebfu
voter-registration.no=Không, tôi không mu\u1ed1n ho\u1eb7c không c\u1ea7n ph\u1ea3i \u0111\u0103ng ký b\u1ecf phi\u1ebfu ngay bây gi\u1edd
vote-registration.expanded.header1=\u0110i\u1ec1u nŕy có \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn s\u1ed1 ti\u1ec1n tr\u1ee3 c\u1ea5p tôi có th\u1ec3 nh\u1eadn \u0111\u01b0\u1ee3c không?
vote-registration.expanded.body1=Vi\u1ec7c n\u1ed9p \u0111\u01a1n \u0111\u0103ng ký ho\u1eb7c t\u1eeb ch\u1ed1i \u0111\u0103ng ký b\u1ecf phi\u1ebfu s\u1ebd không \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn s\u1ed1 ti\u1ec1n tr\u1ee3 c\u1ea5p mŕ c\u01a1 quan nŕy s\u1ebd cung c\u1ea5p cho quý v\u1ecb.
vote-registration.expanded.header2=Li\u1ec7u có ai \u0111ang c\u1ed1 g\u1eafng ng\u0103n c\u1ea3n quy\u1ec1n b\u1ecf phi\u1ebfu c\u1ee7a quý v\u1ecb hay không?
vote-registration.expanded.body2=N\u1ebfu quý v\u1ecb c\u1ea3m th\u1ea5y r\u1eb1ng ai \u0111ó \u0111ă can thi\u1ec7p vŕo quy\u1ec1n \u0111\u0103ng ký ho\u1eb7c t\u1eeb ch\u1ed1i \u0111\u0103ng ký b\u1ecf phi\u1ebfu c\u1ee7a quý v\u1ecb, quy\u1ec1n rięng t\u01b0 c\u1ee7a quý v\u1ecb trong vi\u1ec7c quy\u1ebft \u0111\u1ecbnh \u0111\u0103ng ký hay n\u1ed9p \u0111\u01a1n \u0111\u0103ng ký b\u1ecf phi\u1ebfu, ho\u1eb7c quy\u1ec1n ch\u1ecdn \u0111\u1ea3ng chính tr\u1ecb c\u1ee7a rięng quý v\u1ecb ho\u1eb7c s\u1edf thích chính tr\u1ecb khác, quý v\u1ecb có th\u1ec3 n\u1ed9p \u0111\u01a1n khi\u1ebfu n\u1ea1i lęn B\u1ed9 tr\u01b0\u1edfng Ngo\u1ea1i giao Louisiana, \u1ee6y vięn B\u1ea7u c\u1eed, P.O. Box 94125, Baton Rouge, LA 70804-9125 ho\u1eb7c b\u1eb1ng cách g\u1ecdi <a href="tel:+12259220900">(225) 922-0900</a> ho\u1eb7c <a href="tel:+18008832805">1-800-883-2805 </a>.

