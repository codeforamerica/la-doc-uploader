voter-registration-help.header=Quý v\u1ecb có mu\u1ed1n \u0111\u01b0\u1ee3c tr\u1ee3 giúp \u0111i\u1ec1n \u0111\u01a1n \u0111\u1ec3 \u0111\u0103ng ký b\u1ecf phi\u1ebfu không?
voter-registration-help.subheader=N\u1ebfu quý v\u1ecb mu\u1ed1n \u0111\u01b0\u1ee3c tr\u1ee3 giúp \u0111i\u1ec1n m\u1eabu \u0111\u01a1n \u0111\u0103ng ký c\u1eed tri, chúng tôi s\u1ebd giúp quý v\u1ecb. <br/><br/> Quy\u1ebft \u0111\u1ecbnh těm ho\u1eb7c ch\u1ea5p nh\u1eadn giúp \u0111\u1ee1 hay không lŕ c\u1ee7a quý v\u1ecb. Quý v\u1ecb có th\u1ec3 t\u1ef1 měnh \u0111i\u1ec1n vŕo m\u1eabu \u0111\u01a1n.
