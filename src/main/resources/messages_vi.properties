medicaid.header=Quý v\u1ecb có c\u1ea7n b\u1ea3o hi\u1ec3m y t\u1ebf chi mi\u1ec5n phí hay không?
medicaid.subheader=Chúng tôi có th\u1ec3 chia s\u1ebb thông tin c\u1ee7a quý v\u1ecb t\u1eeb \u0111\u01a1n \u0111\u0103ng ký nŕy v\u1edbi B\u1ed9 Y t\u1ebf Louisiana (LDH). LDH s\u1ebd l\u1ecdc ra nh\u1eefng ai \u0111\u1ee7 \u0111i\u1ec1u ki\u1ec7n \u0111\u0103ng ký vŕ g\u1eedi cho quý v\u1ecb m\u1ed9t lá th\u01b0 cung c\u1ea5p thęm thông tin v\u1ec1 ch\u01b0\u01a1ng trěnh Tr\u1ee3 c\u1ea5p y t\u1ebf. Tr\u1ebb em vŕ ng\u01b0\u1eddi l\u1edbn (d\u01b0\u1edbi 65 tu\u1ed5i không có Medicare) có th\u1ec3 \u0111\u1ee7 \u0111i\u1ec1u ki\u1ec7n tham gia.
medicaid.yes=Vâng, hăy chia s\u1ebb thông tin c\u1ee7a tôi
medicaid.no=Không, \u0111\u1eebng chia s\u1ebb thông tin c\u1ee7a tôi

