how-this-works.adding-documents-l2=Quý v\u1ecb có th\u1ec3 s\u1eed d\u1ee5ng \u0111i\u1ec7n tho\u1ea1i c\u1ee7a měnh \u0111\u1ec3 ch\u1ee5p hěnh gi\u1ea5y t\u1edd ho\u1eb7c t\u1ea3i tŕi li\u1ec7u t\u1eeb thi\u1ebft b\u1ecb c\u1ee7a quý v\u1ecb.
how-this-works.after-you-submit=Sau khi quý v\u1ecb n\u1ed9p \u0111\u01a1n
how-this-works.after-you-submit-l1=Ngŕy n\u1ed9p \u0111\u01a1n \u0111\u0103ng ký c\u1ee7a quý v\u1ecb lŕ ngŕy s\u1edbm nh\u1ea5t mŕ quý v\u1ecb có th\u1ec3 b\u1eaft \u0111\u1ea7u nh\u1eadn phúc l\u1ee3i. N\u1ebfu quý v\u1ecb n\u1ed9p \u0111\u01a1n \u0111\u0103ng kí sau 4:30 pm Central Time ho\u1eb7c vŕo cu\u1ed1i tu\u1ea7n hay ngŕy l\u1ec5, ngŕy n\u1ed9p \u0111\u01a1n s\u1ebd lŕ ngŕy lŕm vi\u1ec7c ti\u1ebfp theo. 
how-this-works.after-you-submit-l2=<b>M\u1ed9t s\u1ed1 ng\u01b0\u1eddi c\u0169ng c\u1ea7n ph\u1ea3i t\u1ea1o tŕi kho\u1ea3n HiRE, ho\u1eb7c có m\u1ed9t tŕi kho\u1ea3n HiRE \u0111ang ho\u1ea1t \u0111\u1ed9ng v\u1edbi \u1ee6y ban L\u1ef1c l\u01b0\u1ee3ng Lao \u0111\u1ed9ng Louisiana \u0111\u1ec3 nh\u1eadn tr\u1ee3 c\u1ea5p SNAP.</b> Chúng tôi s\u1ebd thông báo v\u1edbi quý v\u1ecb n\u1ebfu phát hi\u1ec7n có ai \u0111ó trong m\u1eabu \u0111\u01a1n nŕy c\u1ea7n t\u1ea1o tŕi kho\u1ea3n HiRE.
how-this-works.after-you-submit-l3=Sau khi n\u1ed9p \u0111\u01a1n, b\u1ea1n s\u1ebd nh\u1eadn \u0111\u01b0\u1ee3c th\u01b0 h\u1eb9n trong vňng 10 ngŕy lŕm vi\u1ec7c kčm theo thông tin chi ti\u1ebft v\u1ec1 cu\u1ed9c ph\u1ecfng v\u1ea5n.
how-this-works.your-information-is-secure=<b>Thông tin c\u1ee7a quý v\u1ecb \u0111\u01b0\u1ee3c b\u1ea3o m\u1eadt vŕ s\u1ebd \u0111\u01b0\u1ee3c x\u1eed lý d\u1ef1a tręn chính sách v\u1ec1 quy\u1ec1n rięng t\u01b0 c\u1ee7a chúng tôi.</b>

# Timeout Notice
timeout-notice.title=Thông báo h\u1ebft th\u1eddi gian
timeout-notice.header=Sau hai gi\u1edd không ho\u1ea1t \u0111\u1ed9ng, d\u1eef li\u1ec7u c\u1ee7a b\u1ea1n s\u1ebd b\u1ecb xóa
timeout-notice.subtext=<p>\u0110\u1ec3 b\u1ea3o v\u1ec7 thông tin c\u1ee7a quý v\u1ecb, phięn ho\u1ea1t \u0111\u1ed9ng s\u1ebd h\u1ebft th\u1eddi gian ch\u1edd n\u1ebfu quý v\u1ecb r\u1eddi kh\u1ecfi mŕn hěnh \u0111\u0103ng ký trong 2 ti\u1ebfng tr\u1edf lęn.</p><p>Quý v\u1ecb không th\u1ec3 l\u01b0u \u0111\u01a1n \u0111\u0103ng ký vŕ quay l\u1ea1i sau.</p>

