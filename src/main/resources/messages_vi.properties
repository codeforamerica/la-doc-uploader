doc-upload-recommendations.subtext=Quý v\u1ecb có 30 ngŕy \u0111\u1ec3 g\u1eedi gi\u1ea5y t\u1edd xác minh \u2013 nh\u01b0ng quý v\u1ecb g\u1eedi cŕng s\u1edbm thě chúng tôi xác \u0111\u1ecbnh kh\u1ea3 n\u0103ng \u0111\u1ee7 \u0111i\u1ec1u ki\u1ec7n c\u1ee7a quý v\u1ecb cŕng nhanh. N\u1ebfu hi\u1ec7n t\u1ea1i quý v\u1ecb ch\u01b0a có các gi\u1ea5y t\u1edd nŕy, quý v\u1ecb có th\u1ec3 t\u1ea3i lęn sau khi g\u1eedi \u0111\u01a1n \u0111\u0103ng ký.
